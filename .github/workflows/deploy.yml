name: Deploy Changed Demos

on:
  push:
    branches: [master]
    paths:
      - 'projects/**'
  workflow_dispatch:
    inputs:
      w01-found-a-republic:
        description: 'week-01 / found-a-republic'
        type: boolean
        default: false
      w01-liberty-1776:
        description: 'week-01 / liberty-1776'
        type: boolean
        default: false
      w01-hall-of-the-republic:
        description: 'week-01 / hall-of-the-republic'
        type: boolean
        default: false
      w02-the-turncoat:
        description: 'week-02 / the-turncoat'
        type: boolean
        default: false
      w02-boom-or-bust:
        description: 'week-02 / boom-or-bust'
        type: boolean
        default: false
      w02-fireworks-foundry:
        description: 'week-02 / fireworks-foundry'
        type: boolean
        default: false
      w02-i-only-regret:
        description: 'week-02 / i-only-regret'
        type: boolean
        default: false
      w02-minuteman:
        description: 'week-02 / minuteman'
        type: boolean
        default: false
      w02-patriot-gazette:
        description: 'week-02 / patriot-gazette'
        type: boolean
        default: false
      w02-drafted:
        description: 'week-02 / drafted'
        type: boolean
        default: false
      w02-sons-of-liberty:
        description: 'week-02 / sons-of-liberty'
        type: boolean
        default: false
      w02-liberty-fireworks:
        description: 'week-02 / liberty-fireworks'
        type: boolean
        default: false
      w02-the-convention:
        description: 'week-02 / the-convention'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Find and deploy changed demos
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Map checkbox inputs to demo folder paths
          CHANGED=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            [ "${{ github.event.inputs.w01-found-a-republic }}"   = "true" ] && CHANGED="$CHANGED\nprojects/week-01-8bit-america/demo-01-found-a-republic"
            [ "${{ github.event.inputs.w01-liberty-1776 }}"       = "true" ] && CHANGED="$CHANGED\nprojects/week-01-8bit-america/demo-02-liberty-1776"
            [ "${{ github.event.inputs.w01-hall-of-the-republic }}" = "true" ] && CHANGED="$CHANGED\nprojects/week-01-8bit-america/demo-03-hall-of-the-republic"
            [ "${{ github.event.inputs.w02-the-turncoat }}"       = "true" ] && CHANGED="$CHANGED\nprojects/week-02-red-white-boom/demo-01-the-turncoat"
            [ "${{ github.event.inputs.w02-boom-or-bust }}"       = "true" ] && CHANGED="$CHANGED\nprojects/week-02-red-white-boom/demo-02-boom-or-bust"
            [ "${{ github.event.inputs.w02-fireworks-foundry }}"  = "true" ] && CHANGED="$CHANGED\nprojects/week-02-red-white-boom/demo-02-fireworks-foundry"
            [ "${{ github.event.inputs.w02-i-only-regret }}"      = "true" ] && CHANGED="$CHANGED\nprojects/week-02-red-white-boom/demo-03-i-only-regret"
            [ "${{ github.event.inputs.w02-minuteman }}"          = "true" ] && CHANGED="$CHANGED\nprojects/week-02-red-white-boom/demo-05-minuteman"
            [ "${{ github.event.inputs.w02-patriot-gazette }}"    = "true" ] && CHANGED="$CHANGED\nprojects/week-02-red-white-boom/demo-06-the-patriot-gazette"
            [ "${{ github.event.inputs.w02-drafted }}"            = "true" ] && CHANGED="$CHANGED\nprojects/week-02-red-white-boom/demo-07-drafted"
            [ "${{ github.event.inputs.w02-sons-of-liberty }}"   = "true" ] && CHANGED="$CHANGED\nprojects/week-02-red-white-boom/demo-12-sons-of-liberty"
            [ "${{ github.event.inputs.w02-liberty-fireworks }}" = "true" ] && CHANGED="$CHANGED\nprojects/week-02-red-white-boom/demo-13-liberty-fireworks"
            [ "${{ github.event.inputs.w02-the-convention }}"   = "true" ] && CHANGED="$CHANGED\nprojects/week-02-red-white-boom/demo-08-the-convention"

          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(find projects -mindepth 2 -maxdepth 2 -type d -name 'demo-*' | sort)

          else
            CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" \
              | grep -oE 'projects/[^/]+/demo-[^/]+' \
              | sort -u)
          fi

          if [ -z "$CHANGED" ]; then
            echo "No demo folders changed — nothing to deploy."
            exit 0
          fi

          echo -e "Deploying:\n$CHANGED"

          while IFS= read -r DEMO; do
            [ -z "$DEMO" ] && continue
            [ ! -d "$DEMO" ] && continue

            PROJECT_ID=$(jq -r --arg d "$DEMO" '.[$d].projectId // empty' vercel-projects.json)
            ORG_ID=$(jq -r --arg d "$DEMO" '.[$d].orgId // empty' vercel-projects.json)

            if [ -z "$PROJECT_ID" ]; then
              echo "⚠️  $DEMO — no entry in vercel-projects.json, skipping"
              continue
            fi

            echo "🚀 Deploying $DEMO..."
            (cd "$DEMO" && VERCEL_PROJECT_ID="$PROJECT_ID" VERCEL_ORG_ID="$ORG_ID" \
              vercel deploy --prod --token="$VERCEL_TOKEN" --yes)
          done <<< "$(echo -e "$CHANGED")"
