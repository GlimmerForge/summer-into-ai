<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EARTH PULSE — Planetary Vital Signs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050510;
      color: #e0e8ff;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0;
    }

    /* ── Panel ─────────────────────────────────────────── */
    .panel {
      position: fixed;
      right: 0; top: 0;
      width: 38%;
      height: 100vh;
      background: rgba(8, 12, 30, 0.88);
      border-left: 1px solid #1a2244;
      padding: 28px 28px 20px 28px;
      overflow-y: auto;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .panel-title {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #e0e8ff;
      text-shadow:
        0 0 18px rgba(100, 160, 255, 0.9),
        0 0 40px rgba(60, 100, 255, 0.5);
      line-height: 1;
      margin-bottom: 6px;
    }

    .panel-sub {
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      color: #4455aa;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ── Vitals ─────────────────────────────────────────── */
    .vitals {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .vital {
      background: rgba(15, 20, 50, 0.7);
      border-radius: 6px;
      padding: 10px 14px;
      border-left: 3px solid transparent;
    }
    .vital.seismic   { border-left-color: #ff3355; }
    .vital.market    { border-left-color: #ffcc00; }
    .vital.atmosphere{ border-left-color: #00ddff; }

    .vital-label {
      display: block;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 4px;
      font-weight: bold;
    }
    .vital.seismic    .vital-label { color: #ff3355; }
    .vital.market     .vital-label { color: #ffcc00; }
    .vital.atmosphere .vital-label { color: #00ddff; }

    .vital-stats {
      font-size: 0.82rem;
      color: #b0c0e8;
      line-height: 1.5;
    }

    /* ── Divider ─────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, #1a2244, transparent);
      margin: 4px 0 12px;
    }

    /* ── Analysis ────────────────────────────────────────── */
    .analysis-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #4455aa;
      margin-bottom: 8px;
    }

    .audio-dot {
      display: none;
      color: #00ddff;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      animation: blink 1s step-start infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    .analysis-text {
      font-size: 0.82rem;
      line-height: 1.75;
      color: #c8d8ff;
      white-space: pre-wrap;
      flex: 1;
      min-height: 120px;
    }

    /* ── Footer ──────────────────────────────────────────── */
    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #1a2244;
      display: flex;
      justify-content: space-between;
      font-size: 0.58rem;
      color: #4455aa;
      letter-spacing: 0.1em;
    }

    /* ── Loading state ───────────────────────────────────── */
    .acquiring {
      color: #4455aa;
      animation: pulse-text 1.5s ease-in-out infinite;
    }

    @keyframes pulse-text {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }

    /* ── Scrollbar ───────────────────────────────────────── */
    .panel::-webkit-scrollbar { width: 4px; }
    .panel::-webkit-scrollbar-track { background: transparent; }
    .panel::-webkit-scrollbar-thumb { background: #1a2244; border-radius: 2px; }

    /* ── Error state ─────────────────────────────────────── */
    .error-text { color: #ff3355; }

    /* ── Status indicator ────────────────────────────────── */
    #scan-status {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: #4455aa;
      text-transform: uppercase;
      margin-bottom: 6px;
      min-height: 14px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="quake-tooltip" style="
    display:none; position:fixed; pointer-events:none;
    background:rgba(5,8,20,0.92); border:1px solid #ff330066;
    color:#ff9977; font:11px 'Courier New',monospace;
    padding:6px 10px; border-radius:3px; max-width:220px;
    line-height:1.5; z-index:10;
  "></div>

  <div class="panel">
    <div class="panel-title">EARTH PULSE</div>
    <div class="panel-sub">PLANETARY VITAL SIGNS — LIVE</div>

    <div id="scan-status">Initialising sensors…</div>

    <div class="vitals">
      <div class="vital seismic">
        <span class="vital-label">&#11041; SEISMIC</span>
        <div id="seismic-stats" class="vital-stats acquiring">Scanning…</div>
      </div>
      <div class="vital market">
        <span class="vital-label">&#11041; MARKETS</span>
        <div id="market-stats" class="vital-stats acquiring">Scanning…</div>
      </div>
      <div class="vital atmosphere">
        <span class="vital-label">&#11041; ATMOSPHERE</span>
        <div id="atmos-stats" class="vital-stats acquiring">Scanning…</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="analysis-header">
      <span>PLANETARY BRIEFING</span>
      <span id="audio-status" class="audio-dot">&#9654; VOICE</span>
    </div>

    <div id="analysis-text" class="analysis-text acquiring">Acquiring signal…</div>

    <div class="footer">
      <span id="last-updated">—</span>
      <span id="countdown"></span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script>
    // ── Canvas setup ──────────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let globeRotation = 0;
    let quakePoints = [];
    let btcChange = 0;
    let btcPrice = 0;
    let tempLabel = '';
    let landGeo = null;    // merged land MultiPolygon
    let bordersGeo = null; // country border MultiLineString

    const stars = Array.from({ length: 180 }, () => ({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 1.5 + 0.3,
      opacity: Math.random() * 0.6 + 0.2,
    }));

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ── Load world geography ──────────────────────────────────────────────────
    fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
      .then(r => r.json())
      .then(world => {
        landGeo    = topojson.feature(world, world.objects.land);
        bordersGeo = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);
      });

    // ── Hover tooltip ─────────────────────────────────────────────────────────
    const tooltip = document.getElementById('quake-tooltip');
    canvas.addEventListener('mousemove', e => {
      const W = canvas.width, H = canvas.height;
      const cx = W * 0.31, cy = H * 0.5;
      const R = Math.min(W * 0.26, H * 0.41);
      const mx = e.clientX, my = e.clientY;

      let closest = null, closestDist = 18;
      quakePoints.forEach(q => {
        const p = project(q.lat, q.lon, cx, cy, R, globeRotation);
        if (!p) return;
        const d = Math.hypot(p.x - mx, p.y - my);
        if (d < closestDist) { closestDist = d; closest = q; }
      });

      if (closest) {
        tooltip.innerHTML = `<strong>M${closest.mag}</strong><br>${closest.place}<br><span style="color:#556677;font-size:9px">depth ${closest.depth}km</span>`;
        tooltip.style.display = 'block';
        tooltip.style.left = (mx + 14) + 'px';
        tooltip.style.top  = (my - 10) + 'px';
      } else {
        tooltip.style.display = 'none';
      }
    });
    canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

    // ── Orthographic projection ───────────────────────────────────────────────
    function project(lat, lon, cx, cy, R, rotation) {
      const phi    = lat * Math.PI / 180;
      const lambda = lon * Math.PI / 180 - rotation;
      const phi0   = 15 * Math.PI / 180; // slight tilt toward north
      const cosC   = Math.sin(phi0) * Math.sin(phi) +
                     Math.cos(phi0) * Math.cos(phi) * Math.cos(lambda);
      if (cosC < 0) return null;
      const x = cx + R * Math.cos(phi) * Math.sin(lambda);
      const y = cy - R * (Math.cos(phi0) * Math.sin(phi) -
                          Math.sin(phi0) * Math.cos(phi) * Math.cos(lambda));
      return { x, y, depth: cosC };
    }

    function drawGridLine(pts) {
      ctx.beginPath();
      let first = true;
      pts.forEach(p => {
        if (!p) { first = true; return; }
        if (first) { ctx.moveTo(p.x, p.y); first = false; }
        else ctx.lineTo(p.x, p.y);
      });
      ctx.stroke();
    }

    function drawGeoFill(geometry, cx, cy, R) {
      const polys = geometry.type === 'MultiPolygon' ? geometry.coordinates : [geometry.coordinates];
      polys.forEach(poly => {
        if (!poly[0]) return;
        ctx.beginPath();
        let penDown = false;
        poly[0].forEach(([lon, lat]) => {
          const p = project(lat, lon, cx, cy, R, globeRotation);
          if (!p) { penDown = false; return; }
          if (!penDown) { ctx.moveTo(p.x, p.y); penDown = true; }
          else ctx.lineTo(p.x, p.y);
        });
        ctx.closePath();
        ctx.fill();
      });
    }

    function drawGeoLines(geometry, cx, cy, R) {
      const lines = geometry.type === 'MultiLineString' ? geometry.coordinates : [geometry.coordinates];
      lines.forEach(line => {
        ctx.beginPath();
        let penDown = false;
        line.forEach(([lon, lat]) => {
          const p = project(lat, lon, cx, cy, R, globeRotation);
          if (!p) { penDown = false; return; }
          if (!penDown) { ctx.moveTo(p.x, p.y); penDown = true; }
          else ctx.lineTo(p.x, p.y);
        });
        ctx.stroke();
      });
    }

    // ── Draw loop ─────────────────────────────────────────────────────────────
    function draw() {
      const W  = canvas.width;
      const H  = canvas.height;
      const cx = W * 0.31;
      const cy = H * 0.5;

      globeRotation += 0.0025;

      // Background
      ctx.fillStyle = '#020508';
      ctx.fillRect(0, 0, W, H);

      // Stars
      stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x * W * 0.62, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180,200,255,${s.opacity})`;
        ctx.fill();
      });

      const R = Math.min(W * 0.26, H * 0.41);

      // Atmosphere glow
      const atmosGrad = ctx.createRadialGradient(cx, cy, R * 0.96, cx, cy, R * 1.15);
      atmosGrad.addColorStop(0, 'rgba(30,80,200,0.35)');
      atmosGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(cx, cy, R * 1.15, 0, Math.PI * 2);
      ctx.fillStyle = atmosGrad;
      ctx.fill();

      // Globe sphere
      const sphereGrad = ctx.createRadialGradient(cx - R*0.3, cy - R*0.3, R*0.05, cx, cy, R);
      sphereGrad.addColorStop(0,   '#1e3a5a');
      sphereGrad.addColorStop(0.5, '#0c1e38');
      sphereGrad.addColorStop(1,   '#040c1c');
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.fillStyle = sphereGrad;
      ctx.fill();

      // Clip everything to globe
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.clip();

      // Land masses (landGeo is a FeatureCollection from topojson.feature)
      if (landGeo) {
        ctx.fillStyle = '#1b3a24';
        landGeo.features.forEach(f => f.geometry && drawGeoFill(f.geometry, cx, cy, R));
        ctx.fillStyle = 'rgba(40,90,55,0.22)';
        landGeo.features.forEach(f => f.geometry && drawGeoFill(f.geometry, cx, cy, R));
      } else {
        // Fallback grid while geography loads
        ctx.strokeStyle = 'rgba(40,80,160,0.12)';
        ctx.lineWidth = 0.5;
        for (let lat = -80; lat <= 80; lat += 30) {
          const pts = [];
          for (let lon = -180; lon <= 180; lon += 4) pts.push(project(lat, lon, cx, cy, R, globeRotation));
          drawGridLine(pts);
        }
      }

      // Country borders (bordersGeo from topojson.mesh() IS the geometry directly)
      if (bordersGeo) {
        ctx.strokeStyle = 'rgba(70,160,90,0.3)';
        ctx.lineWidth = 0.5;
        drawGeoLines(bordersGeo, cx, cy, R);
      }

      // Earthquake dots
      quakePoints.forEach(q => {
        const p = project(q.lat, q.lon, cx, cy, R, globeRotation);
        if (!p) return;

        q.pulse = (q.pulse || Math.random() * Math.PI * 2) + 0.06;
        const brightness = 0.5 + p.depth * 0.5;
        const sz = Math.max(1.5, (q.mag - 2) * 1.8);

        // Color by magnitude
        let color;
        if (q.mag >= 6)      color = '#ff0033';
        else if (q.mag >= 5) color = '#ff4400';
        else if (q.mag >= 4) color = '#ff9900';
        else if (q.mag >= 3) color = '#ffdd00';
        else                 color = '#88ff66';

        // Outer pulse ring for big quakes
        if (q.mag >= 4) {
          const pr = sz * (2.5 + Math.sin(q.pulse) * 1.5);
          const pg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, pr * 3);
          pg.addColorStop(0, color + Math.floor(brightness * 80).toString(16).padStart(2,'0'));
          pg.addColorStop(1, color + '00');
          ctx.beginPath();
          ctx.arc(p.x, p.y, pr * 3, 0, Math.PI * 2);
          ctx.fillStyle = pg;
          ctx.fill();
        }

        // Core dot
        ctx.beginPath();
        ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.globalAlpha = brightness;
        ctx.fill();
        ctx.globalAlpha = 1;
      });

      // Labels for M5+ quakes (drawn on top of dots, still inside clip)
      ctx.save();
      quakePoints.forEach(q => {
        if (q.mag < 5) return;
        const p = project(q.lat, q.lon, cx, cy, R, globeRotation);
        if (!p || p.depth < 0.15) return;
        const label = `M${q.mag} — ${q.place}`;
        const truncated = label.length > 38 ? label.slice(0, 36) + '…' : label;
        const dotR = Math.max(1.5, (q.mag - 2) * 1.8);
        // Draw a short leader line from dot outward
        const angle = Math.atan2(p.y - cy, p.x - cx);
        const lx1 = p.x + Math.cos(angle) * (dotR + 3);
        const ly1 = p.y + Math.sin(angle) * (dotR + 3);
        const lx2 = p.x + Math.cos(angle) * (dotR + 16);
        const ly2 = p.y + Math.sin(angle) * (dotR + 16);
        ctx.strokeStyle = 'rgba(255,80,50,0.6)';
        ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.moveTo(lx1, ly1); ctx.lineTo(lx2, ly2); ctx.stroke();
        // Text background
        ctx.font = '9px Courier New';
        const tw = ctx.measureText(truncated).width;
        const tx = lx2 + (Math.cos(angle) > 0 ? 3 : -tw - 3);
        const ty = ly2 + 3;
        ctx.fillStyle = 'rgba(2,5,12,0.75)';
        ctx.fillRect(tx - 2, ty - 10, tw + 4, 13);
        // Text
        ctx.fillStyle = q.mag >= 6 ? '#ff2233' : '#ff8866';
        ctx.fillText(truncated, tx, ty);
      });
      ctx.restore();

      ctx.restore();

      // Globe rim highlight
      const rimGrad = ctx.createRadialGradient(cx - R*0.6, cy - R*0.5, R*0.1, cx, cy, R);
      rimGrad.addColorStop(0, 'rgba(120,180,255,0.12)');
      rimGrad.addColorStop(0.7, 'rgba(60,120,220,0.04)');
      rimGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.fillStyle = rimGrad;
      ctx.fill();

      // Magnitude legend (bottom left)
      const legend = [
        { color: '#ff0033', label: 'M6+' },
        { color: '#ff4400', label: 'M5' },
        { color: '#ff9900', label: 'M4' },
        { color: '#ffdd00', label: 'M3' },
        { color: '#88ff66', label: 'M2.5' },
      ];
      legend.forEach((l, i) => {
        const lx = 14, ly = H - 16 - i * 18;
        ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI*2);
        ctx.fillStyle = l.color; ctx.fill();
        ctx.font = '9px Courier New';
        ctx.fillStyle = l.color + 'aa';
        ctx.textAlign = 'left';
        ctx.fillText(l.label, lx + 10, ly + 3);
      });

      // Market ticker (top left corner)
      if (btcPrice) {
        const sign = btcChange >= 0 ? '+' : '';
        const tickColor = btcChange >= 0 ? '#00dd88' : '#ff4422';
        ctx.font = 'bold 11px Courier New';
        ctx.fillStyle = tickColor;
        ctx.textAlign = 'left';
        ctx.fillText(`BTC $${Math.round(btcPrice).toLocaleString()} (${sign}${btcChange.toFixed(2)}%)`, 14, 22);
      }
      if (tempLabel) {
        ctx.font = '10px Courier New';
        ctx.fillStyle = '#00ddffaa';
        ctx.textAlign = 'left';
        ctx.fillText(tempLabel, 14, 38);
      }

      requestAnimationFrame(draw);
    }

    // ── Update globe from vitals ──────────────────────────────────────────────
    function updateIntensities(vitals) {
      btcChange = vitals.market.btcChange ?? 0;
      btcPrice  = vitals.market.btcPrice  ?? 0;
      const maxT = vitals.atmosphere.maxTemp;
      const minT = vitals.atmosphere.minTemp;
      const maxC = vitals.atmosphere.maxCity;
      const minC = vitals.atmosphere.minCity;
      tempLabel = (maxT != null && minT != null) ? `${minT}°C ${minC} → ${maxT}°C ${maxC}` : '';

      if (vitals.seismic.quakes) {
        quakePoints = vitals.seismic.quakes.map(q => ({
          lat: q.lat, lon: q.lon, mag: q.mag, place: q.place,
          pulse: Math.random() * Math.PI * 2,
        }));
      }
    }

    // ── Update stat blocks ────────────────────────────────────────────────────
    function updateStats(vitals) {
      const { seismic, market, atmosphere } = vitals;

      // Seismic
      const seEl = document.getElementById('seismic-stats');
      seEl.className = 'vital-stats';
      if (seismic.count != null) {
        const magStr = seismic.maxMag > 0 ? ` / M${seismic.maxMag} max` : '';
        const sigStr = seismic.significantCount > 0
          ? `\n${seismic.significantCount} event${seismic.significantCount > 1 ? 's' : ''} M3.0+`
          : '\nNo M3.0+ events';
        const locStr = seismic.recentLocation ? `\n${seismic.recentLocation}` : '';
        seEl.textContent = `${seismic.count} events past hr${magStr}${sigStr}${locStr}`;
      } else {
        seEl.textContent = 'Data unavailable';
      }

      // Market
      const mkEl = document.getElementById('market-stats');
      mkEl.className = 'vital-stats';
      if (market.btcPrice != null) {
        const btcChg = market.btcChange != null
          ? ` ${market.btcChange >= 0 ? '+' : ''}${market.btcChange.toFixed(2)}%`
          : '';
        const ethChg = market.ethChange != null
          ? ` ${market.ethChange >= 0 ? '+' : ''}${market.ethChange.toFixed(2)}%`
          : '';
        mkEl.textContent =
          `BTC $${market.btcPrice.toLocaleString()}${btcChg} 24h\nETH $${market.ethPrice.toLocaleString()}${ethChg} 24h`;
      } else {
        mkEl.textContent = 'Data unavailable';
      }

      // Atmosphere
      const atEl = document.getElementById('atmos-stats');
      atEl.className = 'vital-stats';
      if (atmosphere.maxTemp != null) {
        atEl.textContent =
          `${atmosphere.minTemp}°C (${atmosphere.minCity}) → ${atmosphere.maxTemp}°C (${atmosphere.maxCity})\nAvg ${atmosphere.avgTemp}°C across 5 cities`;
      } else {
        atEl.textContent = 'Data unavailable';
      }
    }

    // ── SSE streaming helper ──────────────────────────────────────────────────
    async function streamAnalysis(vitals) {
      const analysiEl = document.getElementById('analysis-text');
      analysiEl.className = 'analysis-text';
      analysiEl.textContent = '';
      let fullText = '';

      const resp = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ vitals }),
      });

      if (!resp.ok) {
        analysiEl.className = 'analysis-text error-text';
        analysiEl.textContent = `Analysis error: ${resp.status}`;
        return null;
      }

      const reader  = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split('\n\n');
        buffer = parts.pop() ?? '';

        for (const part of parts) {
          if (!part.trim()) continue;
          const lines = part.split('\n');
          let eventType = '';
          let dataStr   = '';
          for (const line of lines) {
            if (line.startsWith('event: ')) eventType = line.slice(7).trim();
            if (line.startsWith('data: '))  dataStr   = line.slice(6).trim();
          }
          if (eventType === 'text' && dataStr) {
            try {
              const { text } = JSON.parse(dataStr);
              fullText += text;
              analysiEl.textContent = fullText;
            } catch (_) { /* ignore parse errors */ }
          } else if (eventType === 'done' && dataStr) {
            try {
              fullText = JSON.parse(dataStr).fullText;
              analysiEl.textContent = fullText;
            } catch (_) { /* use accumulated text */ }
          } else if (eventType === 'error' && dataStr) {
            try {
              const { error } = JSON.parse(dataStr);
              analysiEl.className = 'analysis-text error-text';
              analysiEl.textContent = `Briefing error: ${error}`;
            } catch (_) { /* ignore */ }
          }
        }
      }

      return fullText || null;
    }

    // ── Voice ─────────────────────────────────────────────────────────────────
    async function playVoice(text) {
      const audioStatusEl = document.getElementById('audio-status');
      audioStatusEl.style.display = 'inline';

      try {
        const resp = await fetch('/api/voice', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        if (!resp.ok) {
          audioStatusEl.style.display = 'none';
          return;
        }
        const blob = await resp.blob();
        const url  = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.play().catch(() => {
          // Autoplay blocked — keep indicator visible so user knows voice is ready
        });
        audio.onended = () => {
          audioStatusEl.style.display = 'none';
          URL.revokeObjectURL(url);
        };
        audio.onerror = () => {
          audioStatusEl.style.display = 'none';
          URL.revokeObjectURL(url);
        };
      } catch (_) {
        audioStatusEl.style.display = 'none';
      }
    }

    // ── Countdown ─────────────────────────────────────────────────────────────
    let countdownTimer = null;

    function startCountdown(seconds, onDone) {
      if (countdownTimer) clearInterval(countdownTimer);
      const el = document.getElementById('countdown');
      let s = seconds;
      el.textContent = `Next scan in ${s}s`;
      countdownTimer = setInterval(() => {
        s--;
        if (s <= 0) {
          clearInterval(countdownTimer);
          countdownTimer = null;
          el.textContent = 'Scanning…';
          onDone();
        } else {
          el.textContent = `Next scan in ${s}s`;
        }
      }, 1000);
    }

    // ── Main cycle ────────────────────────────────────────────────────────────
    let cycleRunning = false;

    async function runCycle() {
      if (cycleRunning) return;
      cycleRunning = true;

      const statusEl   = document.getElementById('scan-status');
      const analysiEl  = document.getElementById('analysis-text');

      // Reset stat displays to loading
      ['seismic-stats', 'market-stats', 'atmos-stats'].forEach(id => {
        const el = document.getElementById(id);
        el.className = 'vital-stats acquiring';
        el.textContent = 'Scanning…';
      });

      analysiEl.className = 'analysis-text acquiring';
      analysiEl.textContent = 'Acquiring live data…';
      statusEl.textContent  = 'SCANNING — fetching live data…';

      try {
        // 1. Fetch live data
        const dataResp = await fetch('/api/data');
        if (!dataResp.ok) throw new Error(`Data API returned ${dataResp.status}`);
        const vitals = await dataResp.json();

        updateIntensities(vitals);
        updateStats(vitals);
        statusEl.textContent = 'SCANNING — generating briefing…';

        // 2. Stream Claude analysis
        const fullText = await streamAnalysis(vitals);
        statusEl.textContent = 'LIVE';

        // 3. Voice narration
        if (fullText) {
          await playVoice(fullText);
        }

        // 4. Timestamp + schedule next scan
        document.getElementById('last-updated').textContent =
          'Updated ' + new Date().toLocaleTimeString();

      } catch (err) {
        console.error('Cycle error:', err);
        analysiEl.className = 'analysis-text error-text';
        analysiEl.textContent = `Scan failed: ${err.message}`;
        statusEl.textContent  = 'ERROR — retrying in 60s';
      }

      cycleRunning = false;
      startCountdown(60, runCycle);
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    draw();
    runCycle();
  </script>
</body>
</html>
