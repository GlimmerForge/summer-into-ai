document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ont-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"582044b0-b92e-40bb-a010-b05fa919c43d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; background: #05060d; }\n  @keyframes ff-pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }\n  @keyframes ff-fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }\n  .ff-shell:hover, .ff-pal:hover, .ff-btn:hover { filter: brightness(1.12); transform: translateY(-2px); }\n  ::placeholder { color: #6a7390; }\n  input[type=range].ff-range { -webkit-appearance:none; appearance:none; height:5px; border-radius:4px; background:#2a3150; outline:none; }\n  input[type=range].ff-range::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:#ffd76a; cursor:pointer; box-shadow:0 0 8px rgba(255,215,106,.7); }\n  input[type=range].ff-range::-moz-range-thumb { width:16px; height:16px; border:none; border-radius:50%; background:#ffd76a; cursor:pointer; }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div ref=\"{{ refRoot }}\" style=\"min-height:100vh; width:100%; background:radial-gradient(circle at 50% 0%, #11142a 0%, #05060d 70%); display:flex; flex-direction:column; align-items:center; gap:14px; padding:20px 14px 34px; font-family:'Outfit', sans-serif; color:#e7ecff; -webkit-user-select:none; user-select:none;\">\n\n  <div style=\"display:flex; align-items:center; justify-content:space-between; width:min(96vw, 1000px);\">\n    <div style=\"display:flex; align-items:center; gap:10px;\">\n      <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:19px; letter-spacing:1px; color:#fff;\">FIREWORKS FOUNDRY<\u002Fspan>\n      <span style=\"font-family:'Space Grotesk',sans-serif; font-size:10px; letter-spacing:2px; color:#8a93b8; border:1px solid #2a3150; border-radius:20px; padding:3px 9px;\">WEEK 2 · INDEPENDENCE ENGINES<\u002Fspan>\n    <\u002Fdiv>\n    <span style=\"font-family:'Space Grotesk',sans-serif; font-size:10px; letter-spacing:1px; color:{{ aiColor }};\">● {{ aiLabel }}<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- SKY STAGE -->\n  <div style=\"position:relative; width:min(96vw, 1000px); aspect-ratio:1000/600; border-radius:14px; overflow:hidden; box-shadow:0 0 0 1px #1a2240, 0 20px 60px rgba(0,0,0,.6), inset 0 0 0 1px rgba(120,150,255,.08);\">\n    <canvas ref=\"{{ refSky }}\" width=\"1000\" height=\"600\" style=\"position:absolute; inset:0; width:100%; height:100%; cursor:crosshair; display:block;\"><\u002Fcanvas>\n\n    <!-- tap hint -->\n    <sc-if value=\"{{ showHint }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position:absolute; left:0; right:0; top:42%; text-align:center; pointer-events:none; z-index:3;\">\n        <div style=\"display:inline-block; font-family:'Space Grotesk',sans-serif; font-size:17px; letter-spacing:1px; color:#fff; background:rgba(10,14,30,.5); padding:11px 20px; border-radius:30px; animation:ff-pulse 1.6s infinite; backdrop-filter:blur(3px);\">✦ tap the sky to launch ✦<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- toast -->\n    <sc-if value=\"{{ showToast }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; left:0; right:0; bottom:16px; text-align:center; pointer-events:none; z-index:3;\">\n        <div style=\"display:inline-block; font-family:'Space Grotesk',sans-serif; font-size:14px; color:#fff; background:rgba(20,16,40,.7); border:1px solid rgba(255,215,106,.4); padding:9px 16px; border-radius:24px; animation:ff-fade .3s both; backdrop-filter:blur(4px);\">{{ toast }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- selected readout -->\n    <div style=\"position:absolute; left:14px; top:12px; z-index:3; pointer-events:none; font-family:'Space Grotesk',sans-serif; font-size:12px; color:#aeb6da; line-height:1.5; text-shadow:0 1px 4px #000;\">\n      <div style=\"color:#fff; font-weight:600;\">{{ shellLabel }}<\u002Fdiv>\n      <div>{{ paletteLabel }} · {{ sizeLabel }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- now playing -->\n    <sc-if value=\"{{ showPlaying }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; right:14px; top:12px; z-index:3; pointer-events:none; display:flex; align-items:center; gap:7px; font-family:'Space Grotesk',sans-serif; font-size:12px; color:#fff; background:rgba(20,16,40,.6); border:1px solid rgba(255,215,106,.4); padding:6px 11px; border-radius:20px; backdrop-filter:blur(4px); text-shadow:0 1px 3px #000;\">\n        <span style=\"width:8px; height:8px; border-radius:50%; background:#7bdc6b; animation:ff-pulse 1s infinite;\"><\u002Fspan>NOW PLAYING — {{ showTitle }}\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- cinematic title card -->\n    <sc-if value=\"{{ showCard }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; inset:0; z-index:4; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; pointer-events:none; background:radial-gradient(circle at 50% 45%, rgba(5,6,13,.34), rgba(5,6,13,.74)); animation:ff-fade .8s both;\">\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-size:11px; letter-spacing:5px; color:#ffd76a;\">★ A FIREWORKS FOUNDRY PRODUCTION ★<\u002Fdiv>\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:clamp(28px,5vw,52px); letter-spacing:1px; color:#fff; margin-top:14px; text-shadow:0 3px 24px rgba(255,215,106,.4); text-wrap:balance; max-width:90%;\">{{ cardTitle }}<\u002Fdiv>\n        <div style=\"font-family:'Outfit',sans-serif; font-size:clamp(13px,1.8vw,18px); letter-spacing:2px; color:#aeb6da; margin-top:10px;\">{{ cardSub }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- narration caption -->\n    <sc-if value=\"{{ hasCaption }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; left:0; right:0; bottom:26px; z-index:4; text-align:center; pointer-events:none;\">\n        <span style=\"display:inline-block; font-family:'Outfit',sans-serif; font-style:italic; font-size:clamp(15px,2.1vw,21px); color:#fff; text-shadow:0 2px 14px rgba(0,0,0,.9), 0 0 30px rgba(255,215,106,.3); animation:ff-fade .6s both; max-width:84%;\">{{ caption }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- DOCK -->\n  <div style=\"width:min(96vw, 1000px); background:linear-gradient(180deg,#10142a,#0b0e1d); border:1px solid #1c2340; border-radius:14px; padding:14px 16px; display:flex; flex-direction:column; gap:13px;\">\n\n    <!-- AI director -->\n    <div style=\"display:flex; gap:8px; align-items:center; flex-wrap:wrap; background:linear-gradient(90deg, rgba(255,215,106,.09), rgba(79,140,255,.09)); border:1px solid #34406e; border-radius:10px; padding:9px 11px;\">\n      <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:11px; letter-spacing:1px; color:#ffd76a; white-space:nowrap;\">🎬 AI DIRECTOR<\u002Fspan>\n      <input ref=\"{{ refVibe }}\" onkeydown=\"{{ onVibeKey }}\" placeholder=\"describe a show — e.g. “slow patriotic build into a gold finale”\" style=\"flex:1; min-width:160px; font-family:'Outfit',sans-serif; font-size:14px; color:#e7ecff; background:rgba(255,255,255,.05); border:1px solid #2a3150; border-radius:8px; padding:9px 12px; outline:none;\">\n      <button onclick=\"{{ onDirect }}\" class=\"ff-btn\" style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px; color:#0b0e1d; background:linear-gradient(90deg,#ffd76a,#4f8cff); border:none; padding:9px 15px; border-radius:8px; cursor:pointer; transition:transform .12s, filter .12s;\">{{ directLabel }}<\u002Fbutton>\n      <sc-if value=\"{{ showPlaying }}\" hint-placeholder-val=\"{{ false }}\">\n        <button onclick=\"{{ onStopShow }}\" class=\"ff-btn\" style=\"font-family:'Space Grotesk',sans-serif; font-size:12px; color:#fff; background:#b3302b; border:none; padding:9px 12px; border-radius:8px; cursor:pointer;\">■ Stop<\u002Fbutton>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- shells -->\n    <div>\n      <div style=\"font-family:'Space Grotesk',sans-serif; font-size:10px; letter-spacing:2px; color:#7a83a8; margin-bottom:7px;\">SHELL<\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:7px;\">\n        <sc-for list=\"{{ shells }}\" as=\"s\" hint-placeholder-count=\"8\">\n          <button onclick=\"{{ s.on }}\" class=\"ff-shell\" style=\"display:flex; align-items:center; gap:7px; font-family:'Outfit',sans-serif; font-size:13px; color:{{ s.fg }}; background:{{ s.bg }}; border:1px solid {{ s.bd }}; border-radius:9px; padding:7px 11px; cursor:pointer; transition:transform .12s, filter .12s;\">\n            <span style=\"width:13px; height:13px; border-radius:50%; background:{{ s.dot }}; box-shadow:0 0 7px {{ s.glow }};\"><\u002Fspan>{{ s.label }}\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- palettes + controls -->\n    <div style=\"display:flex; flex-wrap:wrap; gap:18px; align-items:flex-end;\">\n      <div>\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-size:10px; letter-spacing:2px; color:#7a83a8; margin-bottom:7px;\">PALETTE<\u002Fdiv>\n        <div style=\"display:flex; flex-wrap:wrap; gap:7px;\">\n          <sc-for list=\"{{ palettes }}\" as=\"p\" hint-placeholder-count=\"7\">\n            <button onclick=\"{{ p.on }}\" class=\"ff-pal\" title=\"{{ p.label }}\" style=\"width:46px; height:30px; border-radius:8px; background:{{ p.grad }}; border:2px solid {{ p.bd }}; cursor:pointer; transition:transform .12s, filter .12s; box-shadow:{{ p.shadow }};\"><\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"min-width:150px;\">\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-size:10px; letter-spacing:2px; color:#7a83a8; margin-bottom:9px;\">BURST SIZE — {{ sizeLabel }}<\u002Fdiv>\n        <input ref=\"{{ refSize }}\" oninput=\"{{ onSize }}\" class=\"ff-range\" type=\"range\" min=\"1\" max=\"3\" step=\"1\" style=\"width:150px;\">\n      <\u002Fdiv>\n\n      <div style=\"display:flex; gap:8px; margin-left:auto; align-items:center;\">\n        <button onclick=\"{{ onInspire }}\" class=\"ff-btn\" style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px; color:#1a1206; background:linear-gradient(180deg,#ffd76a,#f0b43a); border:none; padding:10px 15px; border-radius:9px; cursor:pointer; transition:transform .12s, filter .12s; box-shadow:0 4px 0 #9e7415;\">{{ inspireLabel }}<\u002Fbutton>\n        <button onclick=\"{{ onBeat }}\" class=\"ff-btn\" style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px; color:{{ beatFg }}; background:{{ beatBg }}; border:1px solid {{ beatBd }}; padding:10px 14px; border-radius:9px; cursor:pointer; transition:transform .12s, filter .12s;\">{{ beatLabel }}<\u002Fbutton>\n        <button onclick=\"{{ onFinale }}\" class=\"ff-btn\" style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px; color:#fff; background:linear-gradient(180deg,#e8413a,#b3302b); border:none; padding:10px 15px; border-radius:9px; cursor:pointer; transition:transform .12s, filter .12s; box-shadow:0 4px 0 #7e211d;\">★ FINALE<\u002Fbutton>\n        <button onclick=\"{{ onPoster }}\" class=\"ff-btn\" style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px; color:#e7ecff; background:#1d2444; border:1px solid #34406e; padding:10px 14px; border-radius:9px; cursor:pointer; transition:transform .12s, filter .12s;\">📸 Poster<\u002Fbutton>\n        <button onclick=\"{{ onTrack }}\" class=\"ff-btn\" title=\"Switch music track\" style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:12px; color:#cdb8ff; background:#211b3a; border:1px solid #3a2f5e; padding:10px 12px; border-radius:9px; cursor:pointer; transition:transform .12s, filter .12s;\">{{ trackLabel }}<\u002Fbutton>\n        <button onclick=\"{{ onMute }}\" class=\"ff-btn\" style=\"font-family:'Space Grotesk',sans-serif; font-size:12px; color:#aeb6da; background:#171c33; border:1px solid #2a3150; padding:10px 12px; border-radius:9px; cursor:pointer; transition:transform .12s, filter .12s;\">{{ muteLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"font-family:'Outfit',sans-serif; font-size:12px; color:#67708f;\">Tip: pick a shell + palette, then tap anywhere in the sky. Hold the sky for rapid fire. ★ Finale launches a full barrage.<\u002Fdiv>\n  <\u002Fdiv>\n\n  \n  <div style=\"font-family:'Space Grotesk',sans-serif; font-size:10px; letter-spacing:1px; color:#454d6b; text-align:center;\">DESIGN · LAUNCH · MIX — A FIREWORKS ENGINE FOR THE FOURTH &nbsp;·&nbsp; {{ footerNote }}<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1000,&quot;height&quot;:760}}\">\nclass Component extends DCLogic {\n  state = {\n    shell: 'peony', palette: 'patriot', size: 2,\n    muted: false, showHint: true, toast: '', showToast: false,\n    aiBusy: false, aiLive: false, beatOn: false,\n    directing: false, showPlaying: false, showTitle: '', track: 0,\n    showCard: false, cardTitle: '', cardSub: '', caption: '',\n  };\n\n  MUSIC = [\n    { name: 'Fanfare', step: 0.19, lead: 'square',\n      mel: [523, 659, 784, 1047, 988, 784, 880, 784, 698, 880, 784, 659, 587, 659, 523, 0],\n      harm: [330, 415, 392, 523, 494, 392, 440, 392, 349, 440, 392, 330, 294, 330, 262, 0],\n      bass: [131, 196, 175, 196] },\n    { name: 'March', step: 0.16, lead: 'square',\n      mel: [392, 494, 587, 392, 494, 587, 784, 587, 440, 494, 587, 659, 587, 494, 392, 0],\n      bass: [196, 196, 147, 147, 131, 131, 147, 147] },\n    { name: 'Anthem', step: 0.28, lead: 'triangle',\n      mel: [523, 0, 587, 0, 659, 0, 587, 0, 523, 0, 659, 0, 784, 0, 659, 0],\n      bass: [131, 131, 175, 196] },\n    { name: 'Disco', step: 0.14, lead: 'square',\n      mel: [440, 0, 523, 440, 659, 0, 587, 440, 523, 0, 440, 392, 440, 0, 659, 0],\n      bass: [110, 110, 165, 131] },\n    { name: 'Dreamy', step: 0.24, lead: 'triangle',\n      mel: [659, 784, 880, 784, 988, 880, 784, 659, 587, 659, 784, 659, 523, 587, 659, 0],\n      bass: [165, 220, 196, 147] },\n  ];\n\n  SHELLS = [\n    { key: 'peony', label: 'Peony' },\n    { key: 'chrys', label: 'Chrysanthemum' },\n    { key: 'willow', label: 'Willow' },\n    { key: 'ring', label: 'Ring' },\n    { key: 'palm', label: 'Palm' },\n    { key: 'heart', label: 'Heart' },\n    { key: 'crackle', label: 'Crackle' },\n    { key: 'strobe', label: 'Strobe' },\n  ];\n  PALETTES = {\n    patriot: ['#e8413a', '#ffffff', '#4f8cff'],\n    gold: ['#ffd76a', '#ffb33a', '#fff0c0'],\n    emerald: ['#39e08a', '#8affc0', '#0f8a4a'],\n    sapphire: ['#5f9bff', '#9ec3ff', '#2a4fd0'],\n    rose: ['#ff6fae', '#ffd1e6', '#e0356f'],\n    ice: ['#bff0ff', '#ffffff', '#7fd0ff'],\n    rainbow: ['#ff4d4d', '#ffb24d', '#ffe14d', '#4dff88', '#4dd2ff', '#b24dff'],\n  };\n  PAL_LABEL = { patriot: 'Patriot', gold: 'Gold', emerald: 'Emerald', sapphire: 'Sapphire', rose: 'Rose', ice: 'Ice', rainbow: 'Rainbow' };\n  SIZE_LABEL = { 1: 'Small', 2: 'Medium', 3: 'Large' };\n  COMBOS = [\n    { name: \"Patriot's Cascade\", shell: 'willow', palette: 'patriot' },\n    { name: 'Liberty Bloom', shell: 'peony', palette: 'patriot' },\n    { name: 'Golden Glory', shell: 'chrys', palette: 'gold' },\n    { name: 'Emerald Spring', shell: 'palm', palette: 'emerald' },\n    { name: 'Sapphire Halo', shell: 'ring', palette: 'sapphire' },\n    { name: 'Sweetheart', shell: 'heart', palette: 'rose' },\n    { name: 'Frost Crackle', shell: 'crackle', palette: 'ice' },\n    { name: 'Spectrum Storm', shell: 'chrys', palette: 'rainbow' },\n    { name: 'Starbright Strobe', shell: 'strobe', palette: 'ice' },\n  ];\n\n  componentDidMount() {\n    if (window.claude && typeof window.claude.complete === 'function') this.setState({ aiLive: true });\n    this.W = 1000; this.H = 600; this.waterY = this.H * 0.84;\n    this.rockets = []; this.parts = [];\n    this.stars = [];\n    for (let i = 0; i < 80; i++) this.stars.push({ x: Math.random() * this.W, y: Math.random() * this.waterY * 0.9, r: Math.random() * 1.2 + 0.2, t: Math.random() * 6.28 });\n    this.buildSkyline();\n    this._crowd = [];\n    for (let x = 10; x < this.W; x += 12 + Math.random() * 8) this._crowd.push({ x, r: 4 + Math.random() * 2.5, spark: Math.random() < 0.18, ph: Math.random() * 6.28 });\n    window.__ffGen = (window.__ffGen || 0) + 1; this._gen = window.__ffGen;\n    setTimeout(() => { this.bindCanvas(); this._raf = requestAnimationFrame((t) => this.loop(t)); }, 40);\n  }\n  componentWillUnmount() {\n    cancelAnimationFrame(this._raf); clearTimeout(this._toastT); clearInterval(this._finaleT); clearInterval(this._beatT); clearInterval(this._mTimer); clearInterval(this._holdT);\n    (this._showTimers || []).forEach((id) => clearTimeout(id)); clearTimeout(this._showEnd);\n    if (this.ac) try { this.ac.close(); } catch (e) {}\n  }\n\n  buildSkyline() {\n    // a stylised american skyline silhouette: buildings + an obelisk + a dome\n    const b = []; let x = 0;\n    const seed = [40, 26, 60, 34, 80, 30, 54, 90, 44, 70, 38, 96, 50, 64, 30, 84, 46, 58, 74, 36, 62, 48];\n    let i = 0;\n    while (x < this.W) { const w = 26 + (seed[i % seed.length] % 30); const h = 40 + seed[i % seed.length]; b.push({ x, w, h }); x += w + 4; i++; }\n    this.buildings = b;\n    this.dome = { x: this.W * 0.5, w: 120, h: 96 };\n    this.obelisk = { x: this.W * 0.2, w: 16, h: 150 };\n  }\n\n  bindCanvas() {\n    const cv = this.refSky; if (!cv) return;\n    this.ctx = cv.getContext('2d');\n    const pos = (e) => {\n      const r = cv.getBoundingClientRect();\n      const cx = (e.touches ? e.touches[0].clientX : e.clientX);\n      const cy = (e.touches ? e.touches[0].clientY : e.clientY);\n      return { x: (cx - r.left) / r.width * this.W, y: (cy - r.top) / r.height * this.H };\n    };\n    const launchAt = (p) => this.launch(p.x, Math.min(p.y, this.waterY - 30));\n    const stopHold = () => { this._down = false; clearInterval(this._holdT); this._holdT = null; };\n    const fire = (e) => {\n      e.preventDefault(); const p = pos(e); this._lastPos = p; this._down = true;\n      launchAt(p);\n      if (this.state.showHint) this.setState({ showHint: false });\n      clearInterval(this._holdT);\n      this._holdT = setInterval(() => { if (this._down && this._lastPos) launchAt(this._lastPos); }, 230); // hold = rapid fire even while still\n    };\n    cv.addEventListener('pointerdown', fire);\n    cv.addEventListener('pointerup', stopHold);\n    cv.addEventListener('pointerleave', stopHold);\n    cv.addEventListener('pointercancel', stopHold);\n    cv.addEventListener('pointermove', (e) => { if (this._down) this._lastPos = pos(e); });\n  }\n\n  // ---------------- audio ----------------\n  initAudio() { if (this.ac) { if (this.ac.state === 'suspended') this.ac.resume(); return; } try { this.ac = new (window.AudioContext || window.webkitAudioContext)(); this.noise = this.makeNoise(); } catch (e) {} }\n  makeNoise() { const n = this.ac.sampleRate * 0.6; const buf = this.ac.createBuffer(1, n, this.ac.sampleRate); const d = buf.getChannelData(0); for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1; return buf; }\n  whistle() {\n    if (!this.ac || this.state.muted) return;\n    const t = this.ac.currentTime, o = this.ac.createOscillator(), g = this.ac.createGain();\n    o.type = 'sine'; o.frequency.setValueAtTime(900, t); o.frequency.exponentialRampToValueAtTime(1750, t + 0.55);\n    g.gain.setValueAtTime(0.0001, t); g.gain.exponentialRampToValueAtTime(0.04, t + 0.05); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);\n    o.connect(g); g.connect(this.ac.destination); o.start(t); o.stop(t + 0.62);\n  }\n  boom(vol) {\n    if (!this.ac || this.state.muted) return;\n    const t = this.ac.currentTime;\n    const src = this.ac.createBufferSource(); src.buffer = this.noise;\n    const lp = this.ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 600;\n    const g = this.ac.createGain(); g.gain.setValueAtTime((vol || 0.5) * 0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.45);\n    src.connect(lp); lp.connect(g); g.connect(this.ac.destination); src.start(t); src.stop(t + 0.5);\n    const o = this.ac.createOscillator(), og = this.ac.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(80, t); o.frequency.exponentialRampToValueAtTime(40, t + 0.3);\n    og.gain.setValueAtTime((vol || 0.5) * 0.4, t); og.gain.exponentialRampToValueAtTime(0.001, t + 0.32);\n    o.connect(og); og.connect(this.ac.destination); o.start(t); o.stop(t + 0.34);\n  }\n  crackleSfx() {\n    if (!this.ac || this.state.muted) return;\n    for (let i = 0; i < 6; i++) setTimeout(() => { if (!this.ac) return; const t = this.ac.currentTime, o = this.ac.createOscillator(), g = this.ac.createGain(); o.type = 'square'; o.frequency.value = 1800 + Math.random() * 2200; g.gain.setValueAtTime(0.02, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.05); o.connect(g); g.connect(this.ac.destination); o.start(t); o.stop(t + 0.06); }, i * 60 + Math.random() * 120);\n  }\n  onMute = () => {\n    const m = !this.state.muted;\n    if (this.ac) { try { m ? this.ac.suspend() : this.ac.resume(); } catch (e) {} }\n    this.setState({ muted: m });\n    this.toast(m ? '🔇 Muted' : '🔊 Sound on');\n  };\n\n  // ---------------- launch + burst ----------------\n  launch(x, y) {\n    this.initAudio(); this.whistle();\n    this.rockets.push({ x, y: this.H, tx: x, ty: y, vy: -(8.5 + Math.random() * 1.5), shell: this.state.shell, palette: this.state.palette, size: this.s aleWord || '').toUpperCase().replace(/[^A-Z0-9+&]/g, '').slice(0, 9);\n    if (!fw) fw = (vibe ? vibe.replace(/[^A-Za-z0-9+]+/g, '').toUpperCase().slice(0, 8) : '') || '1776';\n    const track = this.MUSIC.find((m) => m.name === s.track) ? s.track : 'Fanfare';\n    return { title: String(s.title || 'A FIREWORKS SHOW').slice(0, 26), subtitle: String(s.subtitle || '').slice(0, 34), narration: narr.slice(0, 3), finaleWord: fw, palettes: pals.slice(0, 3), track };\n  }\n  playCinematic(show) {\n    this.stopShow();\n    const T = []; const at = (ms, fn) => T.push(setTimeout(fn, ms));\n    const P = (i) => show.palettes[Math.min(i, show.palettes.length - 1)] || 'patriot';\n    const shells = ['peony', 'chrys', 'willow', 'ring', 'palm', 'strobe'];\n    const fire = (palette, size, yLo, yHi) => { const x = this.W * (0.12 + Math.random() * 0.76), y = this.H * (yLo + Math.random() * (yHi - yLo)); this.rockets.push({ x, y: this.H, tx: x, ty: y, vy: -(8.5 + Math.random() * 2), shell: shells[(Math.random() * shells.length) | 0], palette, size }); this.whistle(); };\n    const ti = this.MUSIC.findIndex((m) => m.name === show.track); if (ti >= 0) this.setState({ track: ti });\n    this.setState({ showPlaying: true, showTitle: show.title, showCard: true, cardTitle: show.title, cardSub: show.subtitle, caption: '' });\n    this.startMusic();\n    at(300, () => this.boom(0.4));\n    at(2800, () => this.setState({ showCard: false, caption: show.narration[0] }));\n    [3000, 3700, 4500, 5300, 6100].forEach((ms) => at(ms, () => fire(P(0), 2, 0.16, 0.32)));\n    at(6600, () => this.setState({ caption: show.narration[1] }));\n    [6900, 7500, 8100, 8700, 9300, 9900, 10500].forEach((ms) => at(ms, () => fire(P(1), Math.random() < 0.4 ? 3 : 2, 0.14, 0.3)));\n    at(11000, () => this.setState({ caption: show.narration[2] }));\n    for (let ms = 11400; ms <= 15200; ms += 320) at(ms, () => fire(P(2), 3, 0.12, 0.28));\n    at(12400, () => { this.spellText(show.finaleWord, P(2)); this.boom(0.9); });\n    at(17200, () => { this.setState({ caption: '', showPlaying: false, showTitle: '', showCard: false }); if (!this.state.beatOn) this.stopMusic(); });\n    this._showTimers = T;\n    this.toast('🎬 ' + show.title);\n  }\n  stopShow() {\n    (this._showTimers || []).forEach((id) => clearTimeout(id)); this._showTimers = [];\n    clearTimeout(this._showEnd);\n    if (!this.state.beatOn) this.stopMusic();\n    if (this.state.showPlaying || this.state.showCard) this.setState({ showPlaying: false, showTitle: '', showCard: false, caption: '' });\n  }\n  onStopShow = () => { this.stopShow(); this.toast('Show stopped'); };\n\n  // ---------------- spell text in fireworks (the finale payoff) ----------------\n  computeTextPoints(word) {\n    const off = document.createElement('canvas'); off.width = this.W; off.height = 200;\n    const c = off.getContext('2d');\n    c.fillStyle = '#fff'; c.textAlign = 'center'; c.textBaseline = 'middle';\n    let size = 150;\n    c.font = '800 ' + size + 'px \"Space Grotesk\", Impact, sans-serif';\n    while (c.measureText(word).width > this.W * 0.8 && size > 36) { size -= 6; c.font = '800 ' + size + 'px \"Space Grotesk\", Impact, sans-serif'; }\n    c.fillText(word, off.width / 2, 100);\n    const img = c.getImageData(0, 0, off.width, 200).data;\n    const pts = []; const gap = 7;\n    for (let y = 0; y < 200; y += gap) for (let x = 0; x < this.W; x += gap) { if (img[(y * this.W + x) * 4 + 3] > 128) pts.push({ x, y }); }\n    // cap density\n    if (pts.length > 420) { const keep = []; const stride = pts.length / 420; for (let i = 0; i < 420; i++) keep.push(pts[Math.floor(i * stride)]); return keep; }\n    return pts;\n  }\n  spellText(word, paletteKey) {\n    if (!word) return;\n    const pts = this.computeTextPoints(word); if (!pts.length) return;\n    const pal = this.PALETTES[paletteKey] || this.PALETTES.patriot;\n    const cx = this.W / 2, cy = 150, now = performance.now();\n    for (const pt of pts) {\n      this.parts.push({ x: cx turn null; }\n  }\n  async aiComplete(prompt) {\n    const to = (p, ms) => Promise.race([p, new Promise((_, r) => setTimeout(() => r(new Error('t')), ms))]);\n    if (window.claude && typeof window.claude.complete === 'function') {\n      try { const t = await to(window.claude.complete(prompt), 12000); if (t) return t; } catch (e) {}\n    }\n    try { const r = await to(fetch('/api/ai', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt }) }), 12000); if (r.ok) { const j = await r.json(); if (j && j.text) return j.text; } } catch (e) {}\n    return null;\n  }\n\n  toast(msg) { clearTimeout(this._toastT); this.setState({ toast: msg, showToast: true }); this._toastT = setTimeout(() => this.setState({ showToast: false }), 2600); }\n\n  setShell = (k) => { this.setState({ shell: k }); };\n  setPalette = (k) => { this.setState({ palette: k }); };\n  onSize = (e) => { this.setState({ size: parseInt(e.target.value, 10) }); };\n\n  renderVals() {\n    const s = this.state;\n    const shells = this.SHELLS.map((sh) => {\n      const sel = sh.key === s.shell;\n      const dot = this.PALETTES[s.palette][0];\n      return { label: sh.label, on: () => this.setShell(sh.key),\n        fg: sel ? '#fff' : '#aeb6da', bg: sel ? 'rgba(255,215,106,.14)' : '#141833', bd: sel ? '#ffd76a' : '#262d4a',\n        dot, glow: dot };\n    });\n    const palettes = Object.keys(this.PALETTES).map((k) => {\n      const cols = this.PALETTES[k]; const sel = k === s.palette;\n      const grad = 'linear-gradient(135deg,' + cols.join(',') + ')';\n      return { label: this.PAL_LABEL[k], on: () => this.setPalette(k), grad, bd: sel ? '#ffffff' : 'transparent', shadow: sel ? '0 0 10px rgba(255,255,255,.5)' : '0 2px 6px rgba(0,0,0,.4)' };\n    });\n    return {\n      refRoot: (el) => { this.refRoot = el; },\n      refSky: (el) => { this.refSky = el; if (el && !this.ctx) { this.ctx = el.getContext('2d'); } },\n      refSize: (el) => { this.refSize = el; if (el &&
