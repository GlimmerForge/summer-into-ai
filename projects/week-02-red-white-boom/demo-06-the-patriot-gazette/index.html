<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Patriot Gazette — Harbor Defense 1776</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;cursor:crosshair}
#c{display:block;max-width:100vw;max-height:100vh;object-fit:contain}
#ui-wave{
  position:fixed;top:0;left:0;right:0;text-align:center;
  font-family:'Playfair Display',Georgia,serif;
  font-size:28px;font-weight:700;color:#f4d060;
  text-shadow:0 0 20px #c87820,0 2px 4px #000;
  padding:12px;pointer-events:none;z-index:15;
  opacity:0;transition:opacity .4s;
}
#ui-wave.show{opacity:1}
#ui-dispatch{
  position:fixed;bottom:0;left:0;right:0;
  font-family:'Playfair Display',Georgia,serif;
  font-size:15px;line-height:1.5;color:#f0e8c8;
  text-shadow:0 1px 3px #000;
  background:linear-gradient(transparent,rgba(0,0,0,.78) 28px);
  padding:28px 18px 10px;pointer-events:none;z-index:15;
  min-height:60px;
  opacity:0;transition:opacity .5s;
}
#ui-dispatch.show{opacity:1}
#ui-dispatch span{font-style:italic}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui-wave"></div>
<div id="ui-dispatch"><span></span></div>

<script>
// =====================================================================
// THE PATRIOT GAZETTE — Harbor Defense 1776
// Canvas artillery game with streaming AI narration
// =====================================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1280, H = 720;
canvas.width = W; canvas.height = H;

(function scaleCanvas() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = W * s + 'px';
  canvas.style.height = H * s + 'px';
})();
window.addEventListener('resize', () => {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = W * s + 'px';
  canvas.style.height = H * s + 'px';
});

// ---- World constants ----
const HORIZON = 390;
const CANNON_X = 175;
const CANNON_Y = 530;
const LAUNCH_SPEED = 16;
const GRAVITY = 0.17;
const RELOAD_FRAMES = 150; // 2.5s at 60fps

// ---- Game state ----
const G = {
  state: 'title', // title | playing | wave_clear | gameover | victory
  wave: 1, maxWaves: 3,
  score: 0,
  fortHp: 100, fortMaxHp: 100,
  shakeAmt: 0, flashAmt: 0,
  frame: 0,
};

// ---- Cannon ----
const cannon = {
  angle: -0.55,
  recoil: 0,
  reloadTimer: 0,
  reloading: false,
  canFire: true,
  flashFrames: 0,
};

let balls = [];   // { x, y, vx, vy, from:'player'|'enemy', trail:[] }
let ships = [];
let particles = [];

// ---- Auto-range aim ----
let aimValid = false; // true when mouse is in a reachable zone

// ---- Clouds (pre-generated) ----
const clouds = Array.from({ length: 9 }, (_, i) => ({
  x: (i / 9) * W + Math.random() * 100,
  y: 45 + Math.random() * 110,
  w: 120 + Math.random() * 220,
  h: 28 + Math.random() * 55,
  speed: 0.08 + Math.random() * 0.12,
  alpha: 0.45 + Math.random() * 0.35,
  phase: Math.random() * Math.PI * 2,
}));

// ---- Seagulls ----
const gulls = Array.from({ length: 6 }, () => ({
  x: Math.random() * W,
  y: 80 + Math.random() * 130,
  vx: 0.4 + Math.random() * 0.6,
  flapPhase: Math.random() * Math.PI * 2,
}));

// =====================================================================
// PARTICLE SYSTEM
// =====================================================================
const PCOLORS = {
  fire:     ['#ff6200','#ff8800','#ffaa00','#ff3a00','#ffd000'],
  smoke:    ['#aaa9a0','#8a8880','#c8c5b8','#6a6860'],
  spark:    ['#ffff80','#ffe040','#fff','#ffb020'],
  debris:   ['#7a4012','#5a3008','#3e2000','#b89050','#a08040'],
  water:    ['#3a8aaa','#58a8cc','#80c8ee','#a8daff','#ddf0ff'],
  ember:    ['#ff6200','#ff8800','#ffd000'],
  bubble:   ['rgba(140,200,255,.55)','rgba(190,225,255,.35)'],
  firework: ['#ff4444','#ff8888','#4488ff','#88aaff','#ffffff','#ffff66','#ff66aa'],
};

function spawnP(type, x, y, vx, vy, opts = {}) {
  if (particles.length > 800) return;
  const cols = PCOLORS[type] || ['#fff'];
  particles.push({
    type, x, y, vx, vy,
    size: opts.size ?? (type === 'smoke' ? 9 + Math.random() * 14 :
                        type === 'fire'  ? 5 + Math.random() * 10 : 2 + Math.random() * 5),
    life: 1,
    decay: opts.decay ?? (type === 'smoke'  ? 0.007 + Math.random() * 0.007 :
                          type === 'fire'   ? 0.018 + Math.random() * 0.018 :
                          type === 'water'  ? 0.014 + Math.random() * 0.018 :
                          type === 'bubble' ? 0.012 + Math.random() * 0.01 :
                          0.013 + Math.random() * 0.018),
    color: cols[Math.floor(Math.random() * cols.length)],
    gravity: type === 'fire' ? -0.04 : type === 'smoke' ? -0.025 :
             type === 'bubble' ? -0.09 : type === 'firework' ? 0.06 : 0.12,
    drag: type === 'smoke' ? 0.982 : type === 'fire' ? 0.965 :
          type === 'firework' ? 0.974 : 0.955,
  });
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= p.drag; p.vy *= p.drag;
    p.vy += p.gravity;
    if (p.type === 'smoke') p.size += 0.25;
    else if (p.type === 'fire') p.size *= 0.988;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); }
  }
}

function drawParticles() {
  for (const p of particles) {
    const a = Math.max(0, p.life);
    ctx.save();
    if (p.type === 'smoke') {
      ctx.globalAlpha = a * 0.55;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
      g.addColorStop(0, p.color);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    } else if (p.type === 'fire') {
      ctx.globalAlpha = a * 0.9;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
      g.addColorStop(0, '#fff');
      g.addColorStop(0.25, p.color);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    } else if (p.type === 'debris') {
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.life * 12);
      ctx.fillRect(-p.size * 0.5, -p.size * 0.2, p.size, p.size * 0.4);
      ctx.restore();
    } else if (p.type === 'firework') {
      ctx.globalAlpha = a * a;
      const gr = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 2);
      gr.addColorStop(0, '#fff');
      gr.addColorStop(0.25, p.color);
      gr.addColorStop(1, 'transparent');
      ctx.fillStyle = gr;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.5, p.size), 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
}

// =====================================================================
// SHIP CLASS
// =====================================================================
const SHIP_NAMES = {
  sloop:       ['HMS Petulance','HMS Arrogance','HMS Insolent','HMS Scoundrel','HMS Vainglory'],
  frigate:     ['HMS Tyranny','HMS Oppressor','HMS Insolence','HMS Subjugation','HMS Iron Crown'],
  'man-o-war': ['HMS Dominion','HMS Imperium','HMS Crown\'s Fury','HMS Subjugator','HMS Britannia Rex'],
};

class Ship {
  constructor(x, type, wave) {
    this.x = x;
    this.type = type;
    this.wave = wave;
    this.name = SHIP_NAMES[type][Math.floor(Math.random() * 5)];
    this.baseY = HORIZON - 28;
    this.y = this.baseY;
    this.bobPhase = Math.random() * Math.PI * 2;

    const sc = { sloop: 0.72, frigate: 1.0, 'man-o-war': 1.38 };
    this.scale = sc[type] ?? 1;
    this.W = 186 * this.scale;
    this.H = 98 * this.scale;

    const hp = { sloop: 2, frigate: 4, 'man-o-war': 6 };
    this.hp = hp[type] ?? 3;
    this.maxHp = this.hp;

    const spd = { sloop: 0.65, frigate: 0.42, 'man-o-war': 0.28 };
    this.speed = (spd[type] ?? 0.5) * (1 + (wave - 1) * 0.15);

    this.onFire = false;
    this.sinking = false;
    this.sinkProgress = 0;
    this.dead = false;
    this.listAngle = 0;
    this.holes = [];
    this.mastsDown = 0;
    this.fireTimer = 180 + Math.random() * 240;
    this.wakeTrail = [];
  }

  update() {
    if (this.dead) return;
    this.bobPhase += 0.016;
    this.y = this.baseY + Math.sin(this.bobPhase) * 4.5 * this.scale;

    if (this.sinking) {
      this.sinkProgress += 0.0022;
      this.listAngle = this.sinkProgress * 0.6;
      this.baseY += 0.28;
      if (Math.random() < 0.35) {
        spawnP('bubble', this.x + (Math.random() - 0.5) * this.W * 0.5,
          this.y + this.H * 0.25 * this.scale, 0, -0.8 - Math.random());
      }
      if (this.sinkProgress >= 1) this.dead = true;
      return;
    }

    this.x -= this.speed;

    // Wake trail
    this.wakeTrail.unshift({ x: this.x + this.W * 0.48, y: this.y + 8 * this.scale });
    if (this.wakeTrail.length > 40) this.wakeTrail.pop();

    // Counter-fire
    this.fireTimer--;
    if (this.fireTimer <= 0 && G.state === 'playing') {
      this.fireTimer = 200 + Math.random() * 200;
      this.returnFire();
    }

    // Persistent fire particles
    if (this.onFire && Math.random() < 0.45) {
      const fx = this.x + (Math.random() - 0.5) * this.W * 0.55;
      const fy = this.y - this.H * 0.15 * this.scale + Math.random() * 20 * this.scale;
      spawnP('fire', fx, fy, (Math.random() - 0.5) * 0.4, -0.8 - Math.random() * 1.8);
      if (Math.random() < 0.4) spawnP('smoke', fx, fy - 8, (Math.random() - 0.5) * 0.25, -0.4 - Math.random() * 0.5);
    }

    if (this.x + this.W * 0.5 < -30) {
      // Ship breached the harbor
      G.fortHp = Math.max(0, G.fortHp - 20);
      G.shakeAmt = 22; G.flashAmt = 0.45;
      this.dead = true;
      narrateEvent('breach', this);
      if (G.fortHp <= 0) G.state = 'gameover';
    }
  }

  returnFire() {
    const dx = CANNON_X - this.x;
    const dy = CANNON_Y - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const spd = 5.5 + Math.random() * 2.5;
    const inaccuracy = 0.18 - (this.wave - 1) * 0.04;
    const baseAngle = Math.atan2(dy, dx);
    const angle = baseAngle + (Math.random() - 0.5) * inaccuracy;

    balls.push({
      x: this.x - this.W * 0.4,
      y: this.y - 18 * this.scale,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      from: 'enemy',
      trail: [],
    });

    // Muzzle flash on ship
    for (let i = 0; i < 12; i++) {
      spawnP('spark', this.x - this.W * 0.38, this.y - 15 * this.scale,
        -1.5 - Math.random(), (Math.random() - 0.5) * 2);
    }
    for (let i = 0; i < 8; i++) {
      spawnP('smoke', this.x - this.W * 0.35, this.y - 15 * this.scale,
        -0.8 - Math.random() * 0.5, (Math.random() - 0.5) * 0.5 - 0.3);
    }
  }

  hit() {
    this.hp--;
    this.holes.push({ rx: (Math.random() - 0.4) * 0.75, ry: (Math.random() - 0.2) * 0.55 });
    const dmgFrac = 1 - this.hp / this.maxHp;
    this.onFire = dmgFrac > 0.35;
    if (this.hp < this.maxHp * 0.35 && this.mastsDown === 0) this.mastsDown = 1;
    this.listAngle = (Math.random() - 0.5) * 0.08 * dmgFrac;
    if (this.hp <= 0) this.sink();
    else narrateEvent('hit', this);
  }

  sink() {
    if (this.sinking) return;
    this.sinking = true;
    G.score += { sloop: 150, frigate: 300, 'man-o-war': 600 }[this.type] ?? 200;
    G.shakeAmt = 28; G.flashAmt = 0.65;
    for (let i = 0; i < 70; i++) {
      const a = Math.random() * Math.PI * 2, spd = 2 + Math.random() * 9;
      spawnP('fire', this.x + (Math.random() - 0.5) * this.W * 0.35, this.y,
        Math.cos(a) * spd, Math.sin(a) * spd - 2.5);
    }
    for (let i = 0; i < 35; i++) {
      spawnP('smoke', this.x + (Math.random() - 0.5) * this.W * 0.4, this.y - 10,
        (Math.random() - 0.5) * 1.5, -1 - Math.random() * 2);
    }
    for (let i = 0; i < 25; i++) {
      spawnP('debris', this.x, this.y - 20,
        (Math.random() - 0.5) * 11, -5 - Math.random() * 6);
    }
    narrateEvent('sunk', this);
  }

  getBounds() {
    return {
      l: this.x - this.W * 0.48,
      r: this.x + this.W * 0.48,
      t: this.y - this.H * 0.75 * this.scale,
      b: this.y + this.H * 0.22 * this.scale,
    };
  }
}

// =====================================================================
// DRAW — SKY
// =====================================================================
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, HORIZON);
  g.addColorStop(0,   '#0c1838');
  g.addColorStop(0.28,'#1a3060');
  g.addColorStop(0.55,'#7a3818');
  g.addColorStop(0.75,'#c05018');
  g.addColorStop(0.88,'#e07828');
  g.addColorStop(1,   '#f0a840');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, HORIZON);

  // Sun
  const sx = W * 0.72, sy = HORIZON - 58;
  const sg = ctx.createRadialGradient(sx, sy, 4, sx, sy, 220);
  sg.addColorStop(0,   'rgba(255,228,120,.92)');
  sg.addColorStop(0.18,'rgba(255,170,60,.55)');
  sg.addColorStop(0.45,'rgba(255,100,20,.22)');
  sg.addColorStop(1,   'transparent');
  ctx.fillStyle = sg; ctx.fillRect(0, 0, W, HORIZON);
  ctx.fillStyle = '#fffae0';
  ctx.beginPath(); ctx.arc(sx, sy, 26, 0, Math.PI * 2); ctx.fill();
  ctx.save(); ctx.globalAlpha = 0.45; ctx.fillStyle = 'rgba(255,240,180,.4)';
  ctx.beginPath(); ctx.arc(sx, sy, 44, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// =====================================================================
// DRAW — CLOUDS
// =====================================================================
function drawClouds() {
  for (const c of clouds) {
    c.x += c.speed;
    if (c.x > W + c.w) c.x = -c.w;
    ctx.save();
    ctx.globalAlpha = c.alpha * 0.72;
    const puff = (px, py, r) => {
      const g = ctx.createRadialGradient(px, py, 0, px, py, r);
      g.addColorStop(0, 'rgba(255,218,172,.92)');
      g.addColorStop(0.7,'rgba(255,200,140,.55)');
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.fill();
    };
    puff(c.x,             c.y,           c.h);
    puff(c.x + c.w * .22, c.y - c.h*.28, c.h * .78);
    puff(c.x + c.w * .48, c.y - c.h*.1,  c.h * .88);
    puff(c.x + c.w * .72, c.y - c.h*.22, c.h * .72);
    puff(c.x + c.w,       c.y,           c.h * .65);
    ctx.restore();
  }
}

// =====================================================================
// DRAW — DISTANT COAST
// =====================================================================
function drawCoast() {
  ctx.fillStyle = '#160c04';
  ctx.beginPath(); ctx.moveTo(0, HORIZON);
  const pts = [
    [0,.89],[.04,.86],[.09,.91],[.14,.82],[.18,.88],[.23,.74],[.26,.69],[.30,.77],
    [.34,.72],[.38,.80],[.42,.65],[.46,.71],[.50,.77],[.55,.68],[.60,.73],[.65,.80],
    [.70,.70],[.75,.77],[.80,.84],[.85,.71],[.90,.79],[.95,.83],[1.0,.87],
  ];
  for (const [px, py] of pts) ctx.lineTo(px * W, HORIZON - py * 38);
  ctx.lineTo(W, HORIZON); ctx.closePath(); ctx.fill();

  // Church steeple
  ctx.fillStyle = '#0e0804';
  ctx.beginPath();
  ctx.moveTo(W * .23, HORIZON - 32);
  ctx.lineTo(W * .232, HORIZON - 76);
  ctx.lineTo(W * .234, HORIZON - 32);
  ctx.fill();
}

// =====================================================================
// DRAW — WATER
// =====================================================================
function drawWater(t) {
  const wTop = HORIZON;
  const wg = ctx.createLinearGradient(0, wTop, 0, H);
  wg.addColorStop(0, '#165878');
  wg.addColorStop(0.3,'#0d3c58');
  wg.addColorStop(0.65,'#092840');
  wg.addColorStop(1,  '#051828');
  ctx.fillStyle = wg; ctx.fillRect(0, wTop, W, H - wTop);

  // Sun reflection column
  const sx = W * 0.72;
  for (let i = 0; i < 14; i++) {
    const ry = wTop + 18 + i * 20;
    const rw = 290 - i * 18;
    const a = (0.38 - i * 0.025) * Math.max(0, 1 - i / 16);
    if (a <= 0) break;
    ctx.save(); ctx.globalAlpha = a;
    ctx.beginPath();
    ctx.moveTo(sx - rw * 0.5 + Math.sin(t * .022 + i) * 12, ry);
    for (let x = sx - rw * 0.5; x <= sx + rw * 0.5; x += 5) {
      ctx.lineTo(x, ry + Math.sin(x * 0.05 + t * 0.032 + i * .6) * 3);
    }
    ctx.lineTo(sx + rw * 0.5, ry + 7);
    ctx.lineTo(sx - rw * 0.5, ry + 7);
    ctx.closePath();
    ctx.fillStyle = '#e89040'; ctx.fill();
    ctx.restore();
  }

  // Wave layers
  for (let layer = 0; layer < 9; layer++) {
    const by = wTop + 28 + layer * 37;
    const amp = 2.2 + layer * 0.38;
    const freq = 0.014 - layer * .0008;
    const off = t * (0.38 - layer * 0.036);
    ctx.save(); ctx.globalAlpha = 0.14 + layer * 0.018;
    ctx.strokeStyle = '#62b8d8'; ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 0; x <= W; x += 4) {
      const y = by + Math.sin(x * freq + off) * amp
              + Math.sin(x * freq * 2.2 + off * 1.6) * amp * .38;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke(); ctx.restore();
  }

  // Horizon foam
  ctx.save(); ctx.globalAlpha = 0.28;
  const hg = ctx.createLinearGradient(0, HORIZON - 2, 0, HORIZON + 9);
  hg.addColorStop(0, '#a8dcf0'); hg.addColorStop(1, 'transparent');
  ctx.fillStyle = hg; ctx.fillRect(0, HORIZON - 2, W, 11);
  ctx.restore();
}

// =====================================================================
// DRAW — SHIP WAKE
// =====================================================================
function drawWake(ship) {
  if (ship.wakeTrail.length < 4) return;
  ctx.save(); ctx.globalAlpha = 0.22;
  ctx.strokeStyle = '#9ad8f0'; ctx.lineWidth = 3 * ship.scale;
  ctx.setLineDash([6, 8]);
  ctx.beginPath();
  for (let i = 0; i < ship.wakeTrail.length; i++) {
    const w = ship.wakeTrail[i];
    const a = (1 - i / ship.wakeTrail.length);
    if (i === 0) ctx.moveTo(w.x, w.y);
    else ctx.lineTo(w.x, w.y);
  }
  ctx.stroke(); ctx.restore();
}

// =====================================================================
// DRAW — SHIP (detailed)
// =====================================================================
function drawShip(ship) {
  if (ship.dead) return;
  const sc = ship.scale;
  const W2 = ship.W * 0.5;
  const H2 = ship.H * 0.5;

  // Atmospheric haze for distant ships (entering from right)
  const distFac = Math.max(0, Math.min(1, (ship.x - W * 0.5) / (W * 0.6)));

  ctx.save();
  ctx.globalAlpha = 0.82 + 0.18 * (1 - distFac);
  ctx.translate(ship.x, ship.y + (ship.sinking ? ship.sinkProgress * 90 : 0));
  ctx.rotate(ship.listAngle + Math.sin(ship.bobPhase * .68) * 0.018);

  // === REFLECTION (shadow on water) ===
  ctx.save(); ctx.globalAlpha = 0.18;
  ctx.scale(1, -0.18); ctx.translate(0, -(H2 * .15 * sc + 6) * 2);
  ctx.fillStyle = '#0a2030';
  ctx.beginPath(); ctx.ellipse(0, 0, W2 * .88, H2 * .35, 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // === HULL ===
  const hg = ctx.createLinearGradient(0, -H2 * .08 * sc, 0, H2 * .44 * sc);
  hg.addColorStop(0,   '#543018');
  hg.addColorStop(0.35,'#3c2010');
  hg.addColorStop(0.7, '#281408');
  hg.addColorStop(1,   '#140a02');
  ctx.fillStyle = hg;
  ctx.beginPath();
  ctx.moveTo(-W2 * .92, -H2 * .1 * sc);
  ctx.lineTo( W2 * .68, -H2 * .04 * sc);
  ctx.quadraticCurveTo(W2 * 1.02, H2 * .12 * sc, W2 * .82, H2 * .42 * sc);
  ctx.lineTo(-W2 * .88, H2 * .42 * sc);
  ctx.quadraticCurveTo(-W2 * 1.08, H2 * .18 * sc, -W2 * .92, -H2 * .1 * sc);
  ctx.closePath(); ctx.fill();

  // Hull highlight stripe
  ctx.save(); ctx.globalAlpha = 0.55;
  ctx.strokeStyle = '#c8a030'; ctx.lineWidth = 3.5 * sc;
  ctx.beginPath();
  ctx.moveTo(-W2 * .9, H2 * .04 * sc);
  ctx.lineTo( W2 * .66, H2 * .01 * sc);
  ctx.stroke(); ctx.restore();

  // Copper sheathing (below waterline)
  ctx.save(); ctx.globalAlpha = 0.35;
  ctx.fillStyle = '#7a4018';
  ctx.beginPath();
  ctx.moveTo(-W2 * .88, H2 * .25 * sc);
  ctx.lineTo( W2 * .8,  H2 * .22 * sc);
  ctx.lineTo( W2 * .82, H2 * .42 * sc);
  ctx.lineTo(-W2 * .88, H2 * .42 * sc);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // Planking lines
  ctx.save(); ctx.globalAlpha = 0.22;
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
  for (let i = -2; i <= 4; i++) {
    const py = H2 * .04 * sc + i * 7 * sc;
    ctx.beginPath(); ctx.moveTo(-W2 * .88, py); ctx.lineTo(W2 * .65, py); ctx.stroke();
  }
  ctx.restore();

  // Gun ports
  const numPorts = { sloop: 5, frigate: 10, 'man-o-war': 14 }[ship.type] ?? 8;
  const portSpan = W2 * 1.52;
  ctx.fillStyle = '#0e0602';
  ctx.strokeStyle = '#c8a030'; ctx.lineWidth = 1;
  for (let i = 0; i < numPorts; i++) {
    const px = -W2 * .74 + (i / (numPorts - 1)) * portSpan;
    const pw = 8.5 * sc, ph = 6 * sc;
    const py = H2 * .05 * sc;
    ctx.fillRect(px - pw * .5, py - ph * .5, pw, ph);
    ctx.strokeRect(px - pw * .5, py - ph * .5, pw, ph);
  }

  // Damage holes
  for (const h of ship.holes) {
    const hx = h.rx * W2 * .7, hy = h.ry * H2 * sc;
    ctx.fillStyle = '#060200';
    ctx.beginPath(); ctx.arc(hx, hy, 6 * sc, 0, Math.PI * 2); ctx.fill();
    ctx.save(); ctx.globalAlpha = 0.6; ctx.strokeStyle = '#1e0e04'; ctx.lineWidth = 1;
    ctx.stroke(); ctx.restore();
  }

  // === MASTS ===
  const mastDefs = {
    sloop:       [[ .18, .65], [-.32, .55]],
    frigate:     [[ .28, .52], [-.08, .62], [-.44, .52]],
    'man-o-war': [[ .30, .45], [ .02, .55], [-.28, .50], [-.55, .42]],
  };
  const mDefs = mastDefs[ship.type] ?? mastDefs.frigate;
  const numMasts = mDefs.length - ship.mastsDown;

  for (let mi = 0; mi < numMasts; mi++) {
    const [mfx, mfh] = mDefs[mi];
    const mx = mfx * W2;
    const mastH = H2 * 2.3 * sc * mfh;

    // Mast pole with gradient
    const mg = ctx.createLinearGradient(mx - 2, 0, mx + 2, 0);
    mg.addColorStop(0, '#7a5c10'); mg.addColorStop(0.5, '#c0900e'); mg.addColorStop(1, '#5a4008');
    ctx.strokeStyle = mg; ctx.lineWidth = 4 * sc;
    ctx.beginPath();
    ctx.moveTo(mx, -H2 * .1 * sc);
    ctx.lineTo(mx, -H2 * .1 * sc - mastH);
    ctx.stroke();

    // Fighting top
    const topY = -H2 * .1 * sc - mastH * .54;
    ctx.fillStyle = '#5a3808';
    ctx.beginPath(); ctx.ellipse(mx, topY, 11 * sc, 4.5 * sc, 0, 0, Math.PI * 2); ctx.fill();

    // Yards + sails
    const yardFracs = [.27, .55, .80];
    const numYards = ship.type === 'sloop' ? 2 : 3;
    for (let yi = 0; yi < numYards; yi++) {
      const yardY = -H2 * .1 * sc - mastH * yardFracs[yi];
      const yw = (W2 * .42 - yi * W2 * .06) * mfh;
      ctx.strokeStyle = '#7a5c10'; ctx.lineWidth = 2 * sc;
      ctx.beginPath(); ctx.moveTo(mx - yw, yardY); ctx.lineTo(mx + yw, yardY); ctx.stroke();

      // Sail
      if (!ship.sinking || ship.sinkProgress < 0.45) {
        const sailAlpha = (ship.hp / ship.maxHp) * 0.88;
        ctx.save(); ctx.globalAlpha = sailAlpha;
        const nextY = yi < numYards - 1
          ? -H2 * .1 * sc - mastH * yardFracs[yi + 1]
          : yardY - mastH * .18;
        const sailH = Math.abs(yardY - nextY);
        const sg2 = ctx.createLinearGradient(mx - yw, yardY, mx + yw, yardY);
        sg2.addColorStop(0, '#d8c898'); sg2.addColorStop(.5, '#f0e8d0'); sg2.addColorStop(1, '#c8b880');
        ctx.fillStyle = sg2;
        ctx.beginPath();
        ctx.moveTo(mx - yw, yardY);
        ctx.quadraticCurveTo(mx - yw * .45, yardY + sailH * .5, mx - yw * .22, nextY);
        ctx.lineTo(mx + yw * .22, nextY);
        ctx.quadraticCurveTo(mx + yw * .45, yardY + sailH * .5, mx + yw, yardY);
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    }

    // Shroud rigging
    ctx.save(); ctx.globalAlpha = 0.45; ctx.strokeStyle = '#7a5c10'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(mx, -H2 * .1 * sc - mastH * .48);
    ctx.lineTo(mx + W2 * .28, -H2 * .06 * sc);
    ctx.moveTo(mx, -H2 * .1 * sc - mastH * .48);
    ctx.lineTo(mx - W2 * .28, -H2 * .06 * sc);
    ctx.stroke(); ctx.restore();
  }

  // Bowsprit (diagonal forward mast)
  ctx.strokeStyle = '#8a6010'; ctx.lineWidth = 3 * sc;
  ctx.beginPath();
  ctx.moveTo(W2 * .62, -H2 * .12 * sc);
  ctx.lineTo(W2 * .98, -H2 * .38 * sc);
  ctx.stroke();

  // === UNION JACK FLAG ===
  if (numMasts > 0 && (!ship.sinking || ship.sinkProgress < .28)) {
    const [fmx, fmh] = mDefs[0];
    const flagTop = -H2 * .1 * sc - H2 * 2.3 * sc * fmh * .97;
    const fx = fmx * W2;
    const fw = 22 * sc, fh = 15 * sc;
    ctx.save(); ctx.translate(fx, flagTop);
    ctx.fillStyle = '#002868'; ctx.fillRect(0, 0, fw, fh);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(fw, fh);
    ctx.moveTo(fw, 0); ctx.lineTo(0, fh); ctx.stroke();
    ctx.strokeStyle = '#bf0a30'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(fw * .5, 0); ctx.lineTo(fw * .5, fh);
    ctx.moveTo(0, fh * .5); ctx.lineTo(fw, fh * .5);
    ctx.stroke(); ctx.restore();
  }

  ctx.restore(); // ship transform

  // HP bar above ship — always visible so player knows how many hits left
  if (!ship.dead && !ship.sinking) {
    const bd = ship.getBounds();
    const bw = bd.r - bd.l;
    const bx = bd.l;
    const by = bd.t - 10;
    const hf = ship.hp / ship.maxHp;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,.65)'; ctx.fillRect(bx, by, bw, 6);
    ctx.fillStyle = hf > 0.6 ? '#22c840' : hf > 0.3 ? '#ff8800' : '#cc2000';
    ctx.fillRect(bx, by, bw * hf, 6);
    ctx.strokeStyle = 'rgba(255,255,255,.2)'; ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, bw, 6);
    ctx.restore();
  }
}

// =====================================================================
// DRAW — SEAGULLS
// =====================================================================
function drawGulls() {
  for (const g of gulls) {
    g.x += g.vx;
    if (g.x > W + 20) g.x = -20;
    g.flapPhase += 0.04;
    const wingY = Math.sin(g.flapPhase) * 4;
    ctx.save(); ctx.globalAlpha = 0.55; ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(g.x - 8, g.y + wingY);
    ctx.quadraticCurveTo(g.x - 4, g.y, g.x, g.y);
    ctx.quadraticCurveTo(g.x + 4, g.y, g.x + 8, g.y + wingY);
    ctx.stroke(); ctx.restore();
  }
}

// =====================================================================
// DRAW — FORT & RAMPART
// =====================================================================
function drawFort() {
  // Main wall body — warm sandstone, lighter than before
  const fg = ctx.createLinearGradient(0, CANNON_Y - 80, 0, H);
  fg.addColorStop(0,    '#7a6a50');
  fg.addColorStop(0.25, '#6a5a42');
  fg.addColorStop(0.7,  '#504535');
  fg.addColorStop(1,    '#352d22');
  ctx.fillStyle = fg;
  ctx.beginPath();
  ctx.moveTo(0, CANNON_Y + 35);
  ctx.lineTo(300, CANNON_Y - 25);
  ctx.lineTo(340, CANNON_Y - 15);
  ctx.lineTo(340, H);
  ctx.lineTo(0, H);
  ctx.closePath(); ctx.fill();

  // Edge highlight — lit top surface of parapet
  const topGrad = ctx.createLinearGradient(0, CANNON_Y - 10, 0, CANNON_Y + 10);
  topGrad.addColorStop(0, 'rgba(200,175,120,.45)');
  topGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = topGrad;
  ctx.beginPath();
  ctx.moveTo(0, CANNON_Y + 35);
  ctx.lineTo(300, CANNON_Y - 25);
  ctx.lineTo(300, CANNON_Y - 10);
  ctx.lineTo(0, CANNON_Y + 50);
  ctx.closePath(); ctx.fill();

  // Stone joint lines
  ctx.save(); ctx.globalAlpha = 0.22; ctx.strokeStyle = '#1a1208'; ctx.lineWidth = 1;
  for (let jy = CANNON_Y + 40; jy < H; jy += 22) {
    ctx.beginPath(); ctx.moveTo(0, jy); ctx.lineTo(300, jy - 10); ctx.stroke();
  }
  for (let jx = 0; jx < 340; jx += 38) {
    ctx.beginPath(); ctx.moveTo(jx, CANNON_Y - 10); ctx.lineTo(jx + 10, H); ctx.stroke();
  }
  ctx.restore();

  // Merlons (battlements) — taller, more visible
  const merlon_color = ctx.createLinearGradient(0, CANNON_Y - 120, 0, CANNON_Y - 40);
  merlon_color.addColorStop(0, '#8a7860');
  merlon_color.addColorStop(1, '#5e5040');
  const merlons = [[8,72],[56,68],[106,64],[158,60],[210,56],[262,52]];
  for (const [mx, mh] of merlons) {
    const surfaceY = (CANNON_Y + 35) + (mx / 300) * (-60);
    // Shadow side
    ctx.fillStyle = '#3a3028';
    ctx.fillRect(mx + 30, surfaceY - mh + 30, 6, mh - 30);
    // Main face
    ctx.fillStyle = merlon_color;
    ctx.beginPath();
    ctx.roundRect(mx, surfaceY - mh + 30, 34, mh - 28, [3, 3, 0, 0]);
    ctx.fill();
    // Highlight top edge
    ctx.save(); ctx.globalAlpha = 0.35; ctx.fillStyle = '#d4b880';
    ctx.fillRect(mx, surfaceY - mh + 30, 34, 4);
    ctx.restore();
  }

  // Torch / lantern on leftmost merlon
  const tox = 25, toy = CANNON_Y + 35 - 72 + 30 - 14;
  ctx.fillStyle = '#5a3a10'; ctx.fillRect(tox - 2, toy, 4, 14);
  ctx.save();
  ctx.shadowColor = 'rgba(255,160,30,0.9)'; ctx.shadowBlur = 18;
  ctx.fillStyle = '#ffcc44';
  ctx.beginPath(); ctx.arc(tox, toy - 2, 5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  ctx.save(); ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#ffcc44';
  ctx.beginPath(); ctx.arc(tox, toy - 2, 22, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // Flag pole + American flag
  const fpy = CANNON_Y - 45;
  ctx.strokeStyle = '#9a7820'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(52, fpy + 14); ctx.lineTo(52, fpy - 52); ctx.stroke();
  // Flag waves — 7 stripes
  for (let r = 0; r < 7; r++) {
    ctx.fillStyle = r % 2 === 0 ? '#CC0020' : '#f0f0f0';
    ctx.beginPath();
    ctx.moveTo(52, fpy - 52 + r * 4.5);
    ctx.quadraticCurveTo(66, fpy - 52 + r * 4.5 + 2, 80, fpy - 52 + r * 4.5);
    ctx.lineTo(80, fpy - 52 + r * 4.5 + 4.5);
    ctx.quadraticCurveTo(66, fpy - 52 + r * 4.5 + 2.5, 52, fpy - 52 + r * 4.5 + 4.5);
    ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle = '#002868';
  ctx.beginPath();
  ctx.moveTo(52, fpy - 52);
  ctx.quadraticCurveTo(64, fpy - 52 + 2, 75, fpy - 52);
  ctx.lineTo(75, fpy - 52 + 18);
  ctx.quadraticCurveTo(64, fpy - 52 + 16, 52, fpy - 52 + 18);
  ctx.closePath(); ctx.fill();

  // Fort HP bar
  const hpf = G.fortHp / G.fortMaxHp;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,.6)'; ctx.fillRect(10, H - 30, 140, 16);
  ctx.fillStyle = hpf > 0.5 ? '#22c840' : hpf > 0.25 ? '#ff8800' : '#cc2000';
  ctx.fillRect(10, H - 30, 140 * hpf, 16);
  ctx.strokeStyle = 'rgba(255,255,255,.3)'; ctx.lineWidth = 1; ctx.strokeRect(10, H - 30, 140, 16);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 10px sans-serif';
  ctx.fillText('FORT LIBERTY', 12, H - 17);
  ctx.restore();
}

// =====================================================================
// DRAW — CANNON (detailed, 3D-ish)
// =====================================================================
function drawCannon(t) {
  const cx = CANNON_X - Math.cos(cannon.angle) * cannon.recoil;
  const cy = CANNON_Y - Math.sin(cannon.angle) * cannon.recoil;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(cannon.angle);

  // Carriage cheeks
  const cg = ctx.createLinearGradient(-32, -10, 32, 10);
  cg.addColorStop(0, '#8b5a18'); cg.addColorStop(.5,'#6b4010'); cg.addColorStop(1,'#4a2808');
  ctx.fillStyle = cg;
  ctx.beginPath(); ctx.roundRect(-32, -10, 68, 24, 4); ctx.fill();
  ctx.save(); ctx.globalAlpha = 0.3; ctx.strokeStyle = '#2a1800'; ctx.lineWidth = 1;
  ctx.strokeRect(-32, -10, 68, 24); ctx.restore();

  // Wheels
  for (const wx of [-18, 18]) {
    ctx.save(); ctx.translate(wx, 14);
    const wg = ctx.createRadialGradient(-3,-3,1,0,0,12);
    wg.addColorStop(0,'#a07830'); wg.addColorStop(1,'#3a2008');
    ctx.fillStyle = wg;
    ctx.beginPath(); ctx.arc(0, 0, 13, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#1e1000'; ctx.lineWidth = 2;
    ctx.stroke();
    for (let sp = 0; sp < 8; sp++) {
      const sa = (sp / 8) * Math.PI * 2 + t * 0.01;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(sa)*10,Math.sin(sa)*10);
      ctx.strokeStyle = '#7a5818'; ctx.lineWidth = 1.5; ctx.stroke();
    }
    ctx.fillStyle = '#d4a020';
    ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Barrel — bronze gradient
  const bg = ctx.createLinearGradient(0,-13,0,10);
  bg.addColorStop(0,  '#d4b040');
  bg.addColorStop(0.3,'#a08020');
  bg.addColorStop(0.7,'#684e08');
  bg.addColorStop(1,  '#2a1e00');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.moveTo(-6, -9);
  ctx.lineTo(48, -7.5);
  ctx.lineTo(48,  7.5);
  ctx.lineTo(-6,  9);
  ctx.quadraticCurveTo(-16, 0, -6, -9);
  ctx.closePath(); ctx.fill();

  // Barrel rings (reinforce bands)
  ctx.strokeStyle = '#c0940e'; ctx.lineWidth = 3.5;
  for (const rx of [0, 13, 26]) {
    ctx.beginPath(); ctx.arc(rx, 0, 9.5, -Math.PI*.28, Math.PI*.28); ctx.stroke();
  }
  // Cascabel (rear knob)
  ctx.fillStyle = '#d4b040';
  ctx.beginPath(); ctx.arc(-9, 0, 5, 0, Math.PI*2); ctx.fill();
  // Muzzle
  const mz = ctx.createRadialGradient(48,0,0,48,0,9.5);
  mz.addColorStop(0,'#100800'); mz.addColorStop(.6,'#5a4008'); mz.addColorStop(1,'#a08020');
  ctx.fillStyle = mz;
  ctx.beginPath(); ctx.ellipse(48,0,5,9.5,0,0,Math.PI*2); ctx.fill();

  // Reload arc
  if (cannon.reloading) {
    const prog = 1 - cannon.reloadTimer / RELOAD_FRAMES;
    ctx.strokeStyle = '#ff5500'; ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.arc(16, 0, 20, -Math.PI*.5, -Math.PI*.5 + prog * Math.PI * 2); ctx.stroke();
  }

  ctx.restore();

  // Muzzle flash + fort wall illumination
  if (cannon.flashFrames > 0) {
    cannon.flashFrames--;
    const fa = cannon.flashFrames / 8;

    // Large amber wash on the fort stones around the cannon
    const wg = ctx.createRadialGradient(cx, cy, 5, cx, cy, 110);
    wg.addColorStop(0, `rgba(255,190,60,${fa * 0.55})`);
    wg.addColorStop(0.6, `rgba(255,120,20,${fa * 0.2})`);
    wg.addColorStop(1, 'transparent');
    ctx.fillStyle = wg;
    ctx.beginPath(); ctx.arc(cx, cy, 110, 0, Math.PI * 2); ctx.fill();

    // Tight muzzle tip flash
    const fx = cx + Math.cos(cannon.angle) * 54;
    const fy = cy + Math.sin(cannon.angle) * 54;
    const fg2 = ctx.createRadialGradient(fx, fy, 0, fx, fy, 40);
    fg2.addColorStop(0, `rgba(255,255,230,${fa})`);
    fg2.addColorStop(0.3, `rgba(255,180,50,${fa * 0.85})`);
    fg2.addColorStop(1, 'transparent');
    ctx.fillStyle = fg2;
    ctx.beginPath(); ctx.arc(fx, fy, 40, 0, Math.PI * 2); ctx.fill();
  }
}

// =====================================================================
// DRAW — TRAJECTORY PREVIEW + TARGET RETICLE
// =====================================================================
function drawTrajectory() {
  if (cannon.reloading || !aimValid) return;
  const sx = CANNON_X + Math.cos(cannon.angle) * 55;
  const sy = CANNON_Y + Math.sin(cannon.angle) * 55;
  let vx = Math.cos(cannon.angle) * LAUNCH_SPEED;
  let vy = Math.sin(cannon.angle) * LAUNCH_SPEED;

  ctx.save();
  ctx.setLineDash([5, 9]);
  ctx.strokeStyle = 'rgba(255,220,80,.55)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(sx, sy);
  let x = sx, y = sy;
  for (let i = 0; i < 130; i++) {
    x += vx; y += vy; vy += GRAVITY;
    if (y > H || x > W || x < 0) break;
    ctx.lineTo(x, y);
  }
  ctx.stroke(); ctx.restore();
}

function drawTargetReticle() {
  if (cannon.reloading || !aimValid) return;
  ctx.save();
  const r = 13;
  ctx.strokeStyle = 'rgba(255,200,50,.8)';
  ctx.lineWidth = 2;
  ctx.setLineDash([3, 4]);
  ctx.beginPath(); ctx.arc(mouseX, mouseY, r, 0, Math.PI * 2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(mouseX - r * 1.6, mouseY); ctx.lineTo(mouseX + r * 1.6, mouseY);
  ctx.moveTo(mouseX, mouseY - r * 1.6); ctx.lineTo(mouseX, mouseY + r * 1.6);
  ctx.stroke();
  ctx.restore();
}

// =====================================================================
// DRAW — CANNONBALLS
// =====================================================================
function drawBalls() {
  for (const b of balls) {
    if (b.from === 'player') {
      // Bright orange ember trail with glow
      ctx.save();
      ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 12;
      for (let i = 0; i < b.trail.length; i++) {
        const tr = b.trail[i];
        const frac = i / b.trail.length;
        ctx.globalAlpha = frac * 0.75;
        const hue = 28 - frac * 18;
        ctx.fillStyle = `hsl(${hue},100%,${55 + frac * 20}%)`;
        ctx.beginPath(); ctx.arc(tr.x, tr.y, 1 + frac * 5.5, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    } else {
      // Enemy: simple red trail
      for (let i = 0; i < b.trail.length; i++) {
        const tr = b.trail[i];
        const a = (i / b.trail.length) * 0.45;
        ctx.save(); ctx.globalAlpha = a; ctx.fillStyle = '#ff3030';
        ctx.beginPath(); ctx.arc(tr.x, tr.y, (i / b.trail.length) * 4, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    }
    // Ball core
    const bg = ctx.createRadialGradient(b.x-2, b.y-2, 1, b.x, b.y, 7);
    bg.addColorStop(0, b.from === 'player' ? '#ffe0a0' : '#ffaaaa');
    bg.addColorStop(.4, b.from === 'player' ? '#555' : '#550000');
    bg.addColorStop(1, '#111');
    ctx.save();
    if (b.from === 'player') { ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 20; }
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.arc(b.x, b.y, 7, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

// =====================================================================
// DRAW — VIGNETTE
// =====================================================================
function drawVignette() {
  const vg = ctx.createRadialGradient(W*.5,H*.5,H*.28,W*.5,H*.5,H*.88);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(0,0,0,.68)');
  ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);
}

// =====================================================================
// DRAW — HUD
// =====================================================================
function drawHUD() {
  // Score panel
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,.52)'; ctx.fillRect(W-192,10,182,68);
  ctx.strokeStyle = 'rgba(200,170,40,.4)'; ctx.lineWidth=1; ctx.strokeRect(W-192,10,182,68);
  ctx.fillStyle = '#f4d060'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText(`SCORE: ${G.score}`, W-18, 32);
  ctx.fillStyle = '#a8ddf8'; ctx.fillText(`WAVE: ${G.wave} / ${G.maxWaves}`, W-18, 52);
  const alv = ships.filter(s => !s.dead).length;
  ctx.fillStyle = '#ffaaaa'; ctx.fillText(`SHIPS: ${alv}`, W-18, 70);
  ctx.textAlign = 'left'; ctx.restore();

  // Reload bar bottom-center
  if (cannon.reloading) {
    const prog = 1 - cannon.reloadTimer / RELOAD_FRAMES;
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(W*.5-90,H-38,180,22);
    ctx.fillStyle='#c84400'; ctx.fillRect(W*.5-90,H-38,180*prog,22);
    ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.strokeRect(W*.5-90,H-38,180,22);
    ctx.fillStyle='#fff'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';

function updateBalls() {
  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 22) b.trail.shift();
    b.x += b.vx; b.y += b.vy; b.vy += GRAVITY;

    if (b.x < -30 || b.x > W + 30 || b.y > H + 30) {
      balls.splice(i, 1); continue;
    }

    if (b.from === 'player') {
      let hit = false;
      for (const ship of ships) {
        if (ship.dead || ship.sinking) continue;
        const bd = ship.getBounds();
        if (b.x >= bd.l && b.x <= bd.r && b.y >= bd.t && b.y <= bd.b) {
          boom(b.x, b.y, false);
          ship.hit();
          balls.splice(i, 1);
          hit = true; break;
        }
      }
      if (!hit && b.y > HORIZON + 5 && b.vy > 0) {
        splash(b.x, HORIZON + 4);
        balls.splice(i, 1);
      }
    } else {
      // Enemy ball hits fort area
      if (b.x < 310 && b.y > CANNON_Y - 100 && b.y < H) {
        boom(b.x, b.y, true);
        playFortHitSound();
        G.fortHp = Math.max(0, G.fortHp - (9 + G.wave * 2));
        G.shakeAmt = 16; G.flashAmt = 0.38;
        balls.splice(i, 1);
        if (G.fortHp <= 0) G.state = 'gameover';
      } else if (b.y > H) {
        balls.splice(i, 1);
      }
    }
  }
}

// ── Narration ────────────────────────────────────────────────────────
const dispatch = document.getElementById('ui-dispatch');
const dispatchSpan = dispatch.querySelector('span');
let narrateAbort = null;
let dispatchTimer = null;

const NARRATE_CTX = {
  hit:    (s) => `A British ${s.type} takes a direct hit! ${s.hp} hull points remain.`,
  sunk:   (s) => `The British ${s.type} has been sunk!`,
  breach: (s) => `A British ${s.type} has breached the harbor! The fort is under attack!`,
};

function narrateEvent(type, ship) {
  if (type === 'sunk') playShipSinkSound();

  const context = NARRATE_CTX[type]?.(ship ?? {});
  if (!context) return;

  // Cancel any in-flight stream
  if (narrateAbort) { narrateAbort.abort(); narrateAbort = null; }
  clearTimeout(dispatchTimer);

  const ac = new AbortController();
  narrateAbort = ac;
  dispatchSpan.textContent = '';
  dispatch.classList.add('show');

  fetch('/api/narrate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ context }),
    signal: ac.signal,
  }).then(async res => {
    if (!res.ok || !res.body) return;
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6);
        if (payload === '[DONE]') break;
        try {
          const { text } = JSON.parse(payload);
          if (text) dispatchSpan.textContent += text;
        } catch {}
      }
    }
    // Auto-hide after 6s
    dispatchTimer = setTimeout(() => dispatch.classList.remove('show'), 6000);
  }).catch(() => {});
}

// =====================================================================
// AUDIO ENGINE  (Web Audio API — initialized on first user click)
// =====================================================================
let audioCtx = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // ---- Ocean waves: pink-ish noise → lowpass → slow LFO swell ----
  const SR = audioCtx.sampleRate;
  const bufLen = SR * 6; // 6-second looping buffer
  const waveBuf = audioCtx.createBuffer(1, bufLen, SR);
  const wd = waveBuf.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0;
  for (let i = 0; i < bufLen; i++) {
    const w = Math.random() * 2 - 1;
    b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
    b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
    b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
    wd[i] = (b0+b1+b2+b3+b4+b5+w*0.5362) / 7;
  }
  const waveSrc = audioCtx.createBufferSource();
  waveSrc.buffer = waveBuf; waveSrc.loop = true;

  const waveFlt = audioCtx.createBiquadFilter();
  waveFlt.type = 'lowpass'; waveFlt.frequency.value = 320; waveFlt.Q.value = 1.2;

  // LFO slowly modulates gain for wave swell
  const lfo = audioCtx.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 0.08; // ~12 s period
  const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 0.06;
  const waveGain = audioCtx.createGain(); waveGain.gain.value = 0.14;

  lfo.connect(lfoGain); lfoGain.connect(waveGain.gain);
  waveSrc.connect(waveFlt); waveFlt.connect(waveGain);
  waveGain.connect(audioCtx.destination);
  waveSrc.start(); lfo.start();
}

function playCannonSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const dest = audioCtx.destination;

  // Master limiter — prevents clipping when layers stack
  const limiter = audioCtx.createDynamicsCompressor();
  limiter.threshold.value = -2; limiter.knee.value = 0;
  limiter.ratio.value = 20;    limiter.attack.value = 0.001;
  limiter.release.value = 0.15;
  limiter.connect(dest);

  // Waveshaper for saturation/grit
  const curve = new Float32Array(512);
  for (let i = 0; i < 512; i++) {
    const x = (i * 2) / 512 - 1;
    curve[i] = (Math.PI + 200) * x / (Math.PI + 200 * Math.abs(x));
  }
  const shaper = audioCtx.createWaveShaper(); shaper.curve = curve;
  shaper.connect(limiter);

  // ── Layer 1: sub-bass punch — sine starting at 90 Hz, falls to 20 Hz
  const sub = audioCtx.createOscillator();
  sub.type = 'sine';
  sub.frequency.setValueAtTime(90, t);
  sub.frequency.exponentialRampToValueAtTime(20, t + 0.55);
  const subG = audioCtx.createGain();
  subG.gain.setValueAtTime(3.5, t);
  subG.gain.exponentialRampToValueAtTime(0.0001, t + 0.65);
  sub.connect(subG); subG.connect(limiter);
  sub.start(t); sub.stop(t + 0.7);

  // ── Layer 2: mid-body — triangle at 130 Hz falls to 35 Hz, through shaper
  const mid = audioCtx.createOscillator();
  mid.type = 'triangle';
  mid.frequency.setValueAtTime(130, t);
  mid.frequency.exponentialRampToValueAtTime(35, t + 0.35);
  const midG = audioCtx.createGain();
  midG.gain.setValueAtTime(2.2, t);
  midG.gain.exponentialRampToValueAtTime(0.0001, t + 0.45);
  mid.connect(midG); midG.connect(shaper);
  mid.start(t); mid.stop(t + 0.5);

  // ── Layer 3: initial crack — very brief high-passed noise burst
  const SR = audioCtx.sampleRate;
  const crackBuf = audioCtx.createBuffer(1, Math.floor(SR * 0.06), SR);
  const cd = crackBuf.getChannelData(0);
  for (let i = 0; i < cd.length; i++) cd[i] = Math.random() * 2 - 1;
  const crackSrc = audioCtx.createBufferSource(); crackSrc.buffer = crackBuf;
  const crackHP = audioCtx.createBiquadFilter();
  crackHP.type = 'highpass'; crackHP.frequency.value = 1800;
  const crackG = audioCtx.createGain();
  crackG.gain.setValueAtTime(2.5, t);
  crackG.gain.exponentialRampToValueAtTime(0.0001, t + 0.055);
  crackSrc.connect(crackHP); crackHP.connect(crackG); crackG.connect(limiter);
  crackSrc.start(t);

  // ── Layer 4: rumble tail — brown noise, slow 2-second decay
  const rumbleLen = Math.floor(SR * 2.2);
  const rumbleBuf = audioCtx.createBuffer(1, rumbleLen, SR);
  const rd = rumbleBuf.getChannelData(0);
  let last = 0;
  for (let i = 0; i < rumbleLen; i++) {
    last = (last + (Math.random() * 2 - 1) * 0.08) * 0.99;
    rd[i] = last * 5;
  }
  const rumbleSrc = audioCtx.createBufferSource(); rumbleSrc.buffer = rumbleBuf;
  const rumbleLP = audioCtx.createBiquadFilter();
  rumbleLP.type = 'lowpass'; rumbleLP.frequency.value = 220;
  const rumbleG = audioCtx.createGain();
  rumbleG.gain.setValueAtTime(0.001, t);
  rumbleG.gain.linearRampToValueAtTime(1.4, t + 0.012); // snap in immediately
  rumbleG.gain.exponentialRampToValueAtTime(0.0001, t + 2.0);
  rumbleSrc.connect(rumbleLP); rumbleLP.connect(rumbleG); rumbleG.connect(limiter);
  rumbleSrc.start(t); rumbleSrc.stop(t + 2.2);

  // ── Layer 5: echo reflections — two low-passed delays for stone fort bounce
  [[0.16, 0.28], [0.34, 0.14]].forEach(([delayTime, gain]) => {
    const del = audioCtx.createDelay(1); del.delayTime.value = delayTime;
    const delLP = audioCtx.createBiquadFilter();
    delLP.type = 'lowpass'; delLP.frequency.value = 500;
    const delG = audioCtx.createGain(); delG.gain.value = gain;
    subG.connect(del); del.connect(delLP); delLP.connect(delG); delG.connect(limiter);
  });
}

function playSplashSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const nBuf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.4), audioCtx.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;

  const nFlt = audioCtx.createBiquadFilter();
  nFlt.type = 'bandpass'; nFlt.frequency.value = 600; nFlt.Q.value = 0.5;
  const nGain = audioCtx.createGain();
  nGain.gain.setValueAtTime(0.3, t);
  nGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
  nSrc.connect(nFlt); nFlt.connect(nGain); nGain.connect(audioCtx.destination);
  nSrc.start(t); nSrc.stop(t + 0.4);
}

function playShipSinkSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime, SR = audioCtx.sampleRate;

  // Explosion crack
  const crackBuf = audioCtx.createBuffer(1, Math.floor(SR * 0.08), SR);
  const cd = crackBuf.getChannelData(0);
  for (let i = 0; i < cd.length; i++) cd[i] = Math.random() * 2 - 1;
  const crackSrc = audioCtx.createBufferSource(); crackSrc.buffer = crackBuf;
  const crackHP = audioCtx.createBiquadFilter(); crackHP.type = 'highpass'; crackHP.frequency.value = 800;
  const crackG = audioCtx.createGain();
  crackG.gain.setValueAtTime(2.0, t); crackG.gain.exponentialRampToValueAtTime(0.0001, t + 0.07);
  crackSrc.connect(crackHP); crackHP.connect(crackG); crackG.connect(audioCtx.destination);
  crackSrc.start(t);

  // Deep underwater boom
  const boomO = audioCtx.createOscillator(); boomO.type = 'sine';
  boomO.frequency.setValueAtTime(65, t + 0.04); boomO.frequency.exponentialRampToValueAtTime(18, t + 0.85);
  const boomG = audioCtx.createGain();
  boomG.gain.setValueAtTime(0, t); boomG.gain.linearRampToValueAtTime(2.8, t + 0.05);
  boomG.gain.exponentialRampToValueAtTime(0.0001, t + 0.95);
  boomO.connect(boomG); boomG.connect(audioCtx.destination);
  boomO.start(t); boomO.stop(t + 1.0);

  // Gurgle — filtered noise rising in pitch as ship goes under
  const gBuf = audioCtx.createBuffer(1, Math.floor(SR * 1.6), SR);
  const gd = gBuf.getChannelData(0);
  for (let i = 0; i < gd.length; i++) gd[i] = Math.random() * 2 - 1;
  const gSrc = audioCtx.createBufferSource(); gSrc.buffer = gBuf;
  const gFlt = audioCtx.createBiquadFilter(); gFlt.type = 'bandpass'; gFlt.Q.value = 4;
  gFlt.frequency.setValueAtTime(250, t + 0.3); gFlt.frequency.linearRampToValueAtTime(1400, t + 1.6);
  const gG = audioCtx.createGain();
  gG.gain.setValueAtTime(0, t + 0.3); gG.gain.linearRampToValueAtTime(0.65, t + 0.5);
  gG.gain.exponentialRampToValueAtTime(0.0001, t + 1.6);
  gSrc.connect(gFlt); gFlt.connect(gG); gG.connect(audioCtx.destination);
  gSrc.start(t + 0.3); gSrc.stop(t + 1.65);
}

function playFortHitSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime, SR = audioCtx.sampleRate;

  // Stone thud — low sine with fast decay
  const thud = audioCtx.createOscillator(); thud.type = 'sine';
  thud.frequency.setValueAtTime(115, t); thud.frequency.exponentialRampToValueAtTime(32, t + 0.28);
  const thudG = audioCtx.createGain();
  thudG.gain.setValueAtTime(2.0, t); thudG.gain.exponentialRampToValueAtTime(0.0001, t + 0.32);
  thud.connect(thudG); thudG.connect(audioCtx.destination);
  thud.start(t); thud.stop(t + 0.36);

  // Stone crumble noise burst
  const nBuf = audioCtx.createBuffer(1, Math.floor(SR * 0.38), SR);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
  const nSrc = audioCtx.createBufferSource(); nSrc.buffer = nBuf;
  const nFlt = audioCtx.createBiquadFilter(); nFlt.type = 'bandpass'; nFlt.frequency.value = 380; nFlt.Q.value = 0.9;
  const nG = audioCtx.createGain();
  nG.gain.setValueAtTime(0.75, t); nG.gain.exponentialRampToValueAtTime(0.0001, t + 0.32);
  nSrc.connect(nFlt); nFlt.connect(nG); nG.connect(audioCtx.destination);
  nSrc.start(t); nSrc.stop(t + 0.38);
}

function playVictoryFanfare() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;

  // Bugle call — C4 E4 G4 C5 ascending
  [261.63, 329.63, 392.00, 523.25].forEach((freq, i) => {
    const dt = t + i * 0.24;
    [1, 2].forEach((mult, j) => {
      const osc = audioCtx.createOscillator();
      osc.type = j === 0 ? 'triangle' : 'sine';
      osc.frequency.value = freq * mult;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0, dt); g.gain.linearRampToValueAtTime(j === 0 ? 0.55 : 0.18, dt + 0.04);
      g.gain.setValueAtTime(j === 0 ? 0.55 : 0.18, dt + 0.18);
      g.gain.exponentialRampToValueAtTime(0.0001, dt + (i === 3 ? 0.7 : 0.32));
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(dt); osc.stop(dt + (i === 3 ? 0.75 : 0.38));
    });
  });
}

  spawnWave(1);
  showWaveBanner(`WAVE 1 — SLOOPS APPROACHING`);
}

function showWaveBanner(msg) {
  const el = document.getElementById('ui-wave');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

function checkWaveClear() {
  if (G.state !== 'playing') return;
  if (ships.length === 0) return;
  const active = ships.filter(s => !s.sinking && !s.dead);
  if (active.length > 0) return;
  // All ships sinking or dead
  if (G.wave >= G.maxWaves) {
    G.state = 'victory';
    setTimeout(playVictoryFanfare, 400);
  } else {
    G.state = 'wave_clear';
    const nextWave = G.wave + 1;
    const waveNames = ['','SLOOPS','FRIGATES ADVANCE','MAN-OF-WAR SIGHTED'];
    setTimeout(() => {
      if (G.state !== 'wave_clear') return;
      G.wave = nextWave;
      spawnWave(nextWave);
      G.state = 'playing';
      showWaveBanner(`WAVE ${nextWave} — ${waveNames[nextWave] ?? 'REINFORCE!'}`);
    }, 3500);
  }
}

// =====================================================================
// INPUT — click where you want the ball to land (auto-range)
// =====================================================================
let mouseX = W * .5, mouseY = H * .5;

// Solve ballistic angle to hit (tx, ty) at fixed speed; returns angle or null
function calcAngleForTarget(tx, ty) {
  const dx = tx - CANNON_X;
  if (dx <= 20) return null;
  const dy = ty - CANNON_Y;
  const v = LAUNCH_SPEED;
  const g = GRAVITY;
  const A = 0.5 * g * dx * dx / (v * v);
  const D = dx * dx - 4 * A * (A - dy);
  if (D < 0) return null; // out of range
  const k = (-dx + Math.sqrt(D)) / (2 * A); // low-arc solution
  const angle = Math.atan(k);
  // Clamp to valid barrel range
  return Math.max(-Math.PI * .82, Math.min(-0.06, angle));
}

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * (W / r.width);
  mouseY = (e.clientY - r.top)  * (H / r.height);
  if (G.state === 'playing' || G.state === 'wave_clear') {
    const angle = calcAngleForTarget(mouseX, mouseY);
    if (angle !== null) {
      cannon.angle = angle;
      aimValid = true;
    } else {
      aimValid = false;
    }
  }
});

canvas.addEventListener('click', e => {
  if (e.button !== 0) return;
  if (G.state === 'title')   { startGame(); return; }
  if (G.state === 'gameover' || G.state === 'victory') { G.state = 'title'; return; }
  if (G.state === 'playing' && !cannon.reloading && aimValid) {
    fireCannon();
  }
});

// Touch support — convert to canvas coords and drive same logic
function touchToCanvas(touch) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (touch.clientX - r.left) * (W / r.width),
    y: (touch.clientY - r.top)  * (H / r.height),
  };
}
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const { x, y } = touchToCanvas(e.touches[0]);
  mouseX = x; mouseY = y;
  if (G.state === 'playing' || G.state === 'wave_clear') {
    const angle = calcAngleForTarget(x, y);
    if (angle !== null) { cannon.angle = angle; aimValid = true; }
    else aimValid = false;
  }
}, { passive: false });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const { x, y } = touchToCanvas(e.touches[0]);
  mouseX = x; mouseY = y;
  if (G.state === 'title') { startGame(); return; }
  if (G.state === 'gameover' || G.state === 'victory') { G.state = 'title'; return; }
  if (G.state === 'playing' || G.state === 'wave_clear') {
    const angle = calcAngleForTarget(x, y);
    if (angle !== null) { cannon.angle = angle; aimValid = true; }
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (G.state === 'playing' && !cannon.reloading && aimValid) fireCannon();
}, { passive: false });

// =====================================================================
// MAIN LOOP
// =====================================================================
let lastT = 0;
function loop(ts) {
  const dt = ts - lastT; lastT = ts;
  G.frame++;

  // Screen shake offset
  let sx = 0, sy = 0;
  if (G.shakeAmt > 0) {
    sx = (Math.random()-.5)*G.shakeAmt;
    sy = (Math.random()-.5)*G.shakeAmt;
    G.shakeAmt = Math.max(0, G.shakeAmt - 1.6);
  }

  ctx.save(); ctx.translate(sx, sy);

  // --- RENDER ---
  drawSky();
  drawClouds();
  drawGulls();
  drawCoast();
  drawWater(G.frame);

  // Ship wakes (below ships)
  for (const s of ships) drawWake(s);
  // Ships
  for (const s of ships) drawShip(s);

  drawFort();
  if (G.state === 'playing' || G.state === 'wave_clear') drawCannon(G.frame);
  if (G.state === 'playing') { drawTrajectory(); drawTargetReticle(); }
  drawBalls();
  drawParticles();
  drawVignette();

  // Screen flash
  if (G.flashAmt > 0) {
    ctx.save(); ctx.globalAlpha = G.flashAmt;
    ctx.fillStyle = '#fff'; ctx.fillRect(0,0,W,H);
    ctx.restore();
    G.flashAmt = Math.max(0, G.flashAmt - 0.045);
  }

  if (G.state === 'playing' || G.state === 'wave_clear') drawHUD();
  if (G.state === 'title')    drawTitle();
  if (G.state === 'gameover') drawGameOver();
  if (G.state === 'victory')  drawVictory();

  ctx.restore();

  // --- UPDATE ---
  if (G.state === 'playing') {
    // Update ships
    for (const s of ships) s.update();
    // Remove fully-sunk ships
    ships = ships.filter(s => !s.dead);

    updateBalls();
    updateParticles();

    // Reload
    if (cannon.reloading) {
      cannon.reloadTimer--;
      if (cannon.reloadTimer <= 0) { cannon.reloading = false; cannon.canFire = true; }
    }
    cannon.recoil = Math.max(0, cannon.recoil - 1.8);

    checkWaveClear();
  } else if (G.state === 'wave_clear') {
    for (const s of ships) s.update();
    ships = ships.filter(s => !s.dead);
    updateParticles();
  } else if (G.state === 'victory') {
    updateParticles();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
