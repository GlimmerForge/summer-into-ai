  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

,255,255,.14); padding:12px 14px; border-radius:6px; cursor:pointer; transition:all .12s;\" style-hover=\"background:rgba(242,193,78,.14); border-color:#f2c14e; color:#fff;\">\n                <span style=\"color:#f2c14e; font-family:'Press Start 2P', monospace; font-size:8px; margin-right:8px;\">▸<\u002Fspan>{{ opt.label }}\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- RESOLVING -->\n      <sc-if value=\"{{ isResolving }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:60px 24px; min-height:300px;\">\n          <div style=\"font-family:'EB Garamond', serif; font-style:italic; font-size:19px; color:#cfd2ec;\">{{ thinkingText }}<\u002Fdiv>\n          <div style=\"display:flex; gap:8px; margin-top:22px;\">\n            <span style=\"width:9px; height:9px; background:#f2c14e; animation:fr-pulse 1s infinite 0s;\"><\u002Fspan>\n            <span style=\"width:9px; height:9px; background:#5fb87a; animation:fr-pulse 1s infinite .18s;\"><\u002Fspan>\n            <span style=\"width:9px; height:9px; background:#6f9bff; animation:fr-pulse 1s infinite .36s;\"><\u002Fspan>\n            <span style=\"width:9px; height:9px; background:#e94f37; animation:fr-pulse 1s infinite .54s;\"><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- RESULT -->\n      <sc-if value=\"{{ isResult }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:relative; z-index:2; padding:18px 20px 24px; animation:fr-rise .4s ease both;\">\n          <div style=\"border:2px solid #d8d2bd; background:#f3ead2; border-radius:3px; padding:14px 16px;\">\n            <div style=\"display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #1a1a2e; padding-bottom:6px;\">\n              <span style=\"font-family:'Press Start 2P', monospace; font-size:6px; color:#5a4a32; letter-spacing:1px;\">THE CONTINENTAL HERALD<\u002Fspan>\n              <span style=\"font-family:'Press Start 2P', monospace; font-size:6px; color:#5a4a32;\">{{ resultYear }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-family:'Pirata One', display; font-size:30px; line-height:1.05; color:#16110a; margin-top:10px; text-wrap:balance;\">{{ headline }}<\u002Fdiv>\n            <div style=\"font-family:'EB Garamond', serif; font-size:16px; line-height:1.5; color:#2a2418; margin-top:8px; text-wrap:pretty;\">{{ chronicle }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-wrap:wrap; gap:8px 14px; margin-top:14px; padding:0 2px;\">\n            <sc-for list=\"{{ deltas }}\" as=\"d\" hint-placeholder-count=\"2\">\n              <span style=\"font-size:8px; color:{{ d.color }};\">{{ d.text }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"margin-top:18px;\">\n            <button onclick=\"{{ onContinue }}\" style=\"width:100%; font-family:inherit; font-size:11px; color:#fff; background:#3b6fe0; border:none; padding:16px 18px; border-radius:8px; box-shadow:0 5px 0 #234aa0; cursor:pointer; letter-spacing:1px;\">{{ continueLabel }} ▸<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- LEGACY -->\n      <sc-if value=\"{{ isLegacy }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:relative; z-index:2; padding:24px 22px 28px; text-align:center; animation:fr-rise .5s ease both;\">\n          <div style=\"font-size:8px; color:#6f9bff; letter-spacing:2px;\">THE VERDICT OF HISTORY<\u002Fdiv>\n          <div style=\"font-family:'Pirata One', display; font-size:34px; line-height:1.05; color:#f2c14e; margin-top:12px; text-shadow:2px 2px 0 #b3402b; text-wrap:balance;\">{{ legacyTitle }}<\u002Fdiv>\n          <div style=\"display:inline-block; margin-top:12px; font-size:8px; color:#0c1024; background:{{ gradeColor }}; padding:6px 12px; border-radius:2px; letter-spacing:1px;\">{{ legacyGrade }}<\u002Fdiv>\n          <div style=\"font-family:'EB Garamond', serif; font-size:17px; line-height:1.6; color:#dcdcf0; margin-top:18px; max-width:440px; margin-left:auto; margin-right:auto; text-wrap:pretty;\">{{ legacyVerdict }}<\u002Fdiv>\n          <div style=\"display:flex; justify-content:center; gap:14px 22px; flex-wrap:wrap; margin-top:20px; font-size:7px;\">\n            <span style=\"color:#f2c14e;\">LIBERTY {{ libVal }}<\u002Fspan>\n            <span style=\"color:#5fb87a;\">PROSPERITY {{ prosVal }}<\u002Fspan>\n            <span style=\"color:#6f9bff;\">UNITY {{ uniVal }}<\u002Fspan>\n            <span style=\"color:#e94f37;\">ORDER {{ ordVal }}<\u002Fspan>\n          <\u002Fdiv>\n          <button onclick=\"{{ onStart }}\" style=\"margin-top:26px; font-family:inherit; font-size:10px; color:#fff; background:#e94f37; border:none; padding:13px 20px; border-radius:8px; box-shadow:0 5px 0 #9e3727; cursor:pointer;\">FOUND ANOTHER ▸<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- footer controls -->\n    <div style=\"display:flex; justify-content:space-between; align-items:center; margin-top:12px; padding:0 4px;\">\n      <span style=\"font-size:7px; color:#4d4f6a; letter-spacing:1px;\">{{ footerLabel }}<\u002Fspan>\n      <button onclick=\"{{ onMute }}\" style=\"font-family:inherit; font-size:7px; color:#6f7290; background:#16161f; border:none; padding:6px 10px; border-radius:5px; cursor:pointer;\">{{ muteLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  \n  <div style=\"color:#4d4f6a; font-size:7px; letter-spacing:1px; text-align:center; line-height:2; max-width:560px;\">\n    AMERICA 250 AI BUILD CHALLENGE · THEME 1 · 8-BIT AMERICA<br>\n    <span style=\"color:#6f7290;\">DILEMMAS, CONSEQUENCES &amp; YOUR LEGACY ARE GENERATED LIVE BY AI<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:640,&quot;height&quot;:760}}\">\nclass Component extends DCLogic {\n  MAX_TURNS = 7;\n\n  state = {\n    screen: 'boot',\n    year: 1776,\n    meters: { liberty: 50, prosperity: 50, unity: 50, order: 50 },\n    dilemma: null,\n    result: null,\n    legacy: null,\n    aiLive: false,\n    muted: false,\n    thinkingText: 'The council deliberates\\u2026',\n  };\n\n  THINK = [\n    'The council deliberates\\u2026',\n    'Quills scratch in candlelight\\u2026',\n    'The chamber falls silent\\u2026',\n    'History holds its breath\\u2026',\n    'The presses are warming\\u2026',\n  ];\n\n  BAKED = [\n    { speaker: 'THE CONGRESS', prompt: 'Independence is won on paper. How shall the new government hold its power?',\n      options: [\n        { label: 'A single strong executive', eff: { l: -6, p: 4, u: 8, o: 10 }, headline: 'A SINGLE HAND AT THE HELM', note: 'Decisions come swiftly\\u2014though some whisper the word \"king.\"' },\n        { label: 'A plural council of equals', eff: { l: 8, p: -2, u: 2, o: -6 }, headline: 'GOVERNMENT BY COMMITTEE', note: 'Power is shared widely; consensus is free but slow.' },\n        { label: 'Leave it to the states', eff: { l: 10, p: -4, u: -10, o: -4 }, headline: 'THE STATES KEEP THEIR CROWNS', note: 'The states guard their liberty, but the union begins to fray.' },\n      ] },\n    { speaker: 'THE TREASURER', prompt: 'War debts crush the treasury. What of the soldiers and creditors you owe?',\n      options: [\n        { label: 'Honor every debt in full', eff: { p: 6, u: 6, o: 4, l: -4 }, headline: 'THE REPUBLIC PAYS ITS WORD', note: 'Credit is restored abroad; taxes bite hard at home.' },\n        { label: 'Forgive the debts', eff: { p: -8, u: -6, l: 6, o: -4 }, headline: 'DEBTS STRUCK FROM THE BOOKS', note: 'Relief today purchases distrust tomorrow.' },\n        { label: 'Assume state debts nationally', eff: { u: 10, p: 2, o: 4, l: -6 }, headline: 'ONE NATION, ONE LEDGER', note: 'The union binds tighter\\u2014to the purse and to each other.' },\n      ] },\n    { speaker: 'THE GENERAL', prompt: 'Threats gather at the frontier. How shall the republic defend itself?',\n      options: [\n        { label: 'Raise a standing army', eff: { o: 12, u: 6, l: -10, p: -4 }, headline: 'MUSKETS UNDER ONE FLAG', note: 'Safety rises; liberty eyes the barracks warily.' },\n        { label: 'Rely on state militias', eff: { l: 8, o: -8, u: -4 }, headline: 'EVERY FARMER A SOLDIER', note: 'Free of tyranny, but slow to muster.' },\n        { label: 'Buy peace by treaty', eff: { p: 6, l: 4, o: -6, u: -2 }, headline: 'INK INSTEAD OF IRON', note: 'Peace is bought; the republic\\u2019s strength stays untested.' },\n      ] },\n    { speaker: 'THE PRESS', prompt: 'Pamphlets attack the government daily. Shall speech run free, or be curbed for order?',\n      options: [\n        { label: 'Protect all speech', eff: { l: 12, o: -8, u: -2 }, headline: 'THE PRESS RUNS FREE', note: 'Liberty thrives amid the noise and the slander alike.' },\n        { label: 'Punish sedition', eff: { o: 10, l: -12, u: 2 }, headline: 'THE GAG OF LAW', note: 'Order is gained; the founders\\u2019 own words blush.' },\n        { label: 'License the printers', eff: { o: 4, l: -6, p: 2 }, headline: 'STAMPED AND APPROVED', note: 'A quiet leash is fastened to the quill.' },\n      ] },\n    { speaker: 'THE SCHOOLMASTER', prompt: 'Coin is scarce. Build roads for trade, or schools for the people?',\n      options: [\n        { label: 'Roads and canals', eff: { p: 12, u: 4, l: -2 }, headline: 'THE REPUBLIC ON THE MOVE', note: 'Markets bloom; the schoolhouse waits its turn.' },\n        { label: 'Public schools', eff: { l: 8, u: 6, p: -6 }, headline: 'A LAMP IN EVERY TOWN', note: 'Citizens learn to govern themselves; the treasury sighs.' },\n        { label: 'Neither\\u2014cut taxes', eff: { p: 4, l: 4, u: -6, o: -2 }, headline: 'THE PEOPLE KEEP THEIR PENNIES', note: 'Relief now; little built to outlast the moment.' },\n      ] },\n    { speaker: 'THE CONGREGATION', prompt: 'Shall the republic favor an established church, or wall off faith from state?',\n      options: [\n        { label: 'Separate church and state', eff: { l: 12, u: -2, o: -2 }, headline: 'A WALL OF SEPARATION', note: 'Conscience is freed; old traditions grumble.' },\n        { label: 'Establish a state church', eff: { u: 8, o: 6, l: -12 }, headline: 'ONE FAITH, ONE STATE', note: 'Unity by creed\\u2014and dissenters who chafe under it.' },\n        { label: 'Let each state decide', eff: { l: 2, u: -6, o: -2 }, headline: 'FAITH LEFT TO THE STATES', note: 'A patchwork of pulpits across the land.' },\n      ] },\n    { speaker: 'THE PEOPLE', prompt: 'Who may cast a vote in the new republic?',\n      options: [\n        { label: 'Widen the franchise', eff: { l: 12, u: 6, o: -6, p: -2 }, headline: 'THE BALLOT BROADENS', note: 'More voices join the chorus\\u2014and more friction with them.' },\n        { label: 'Property owners only', eff: { o: 8, p: 4, l: -10, u: -4 }, headline: 'THE VOTE STAYS LANDED', note: 'Stability for some; exclusion stains the rest.' },\n        { label: 'Defer the question', eff: { u: -4, o: 2, l: -2 }, headline: 'A QUESTION POSTPONED', note: 'The reckoning is left for a later, harder age.' },\n      ] },\n    { speaker: 'THE DELEGATES', prompt: 'The states quarrel endlessly. Forge a binding Constitution, or keep a loose league?',\n      options: [\n        { label: 'Ratify a strong Constitution', eff: { u: 14, o: 8, l: -6, p: 4 }, headline: 'A MORE PERFECT UNION', note: 'The union holds firm; the states cede hard-won ground.' },\n        { label: 'Keep the Articles loose', eff: { l: 8, u: -12, o: -6 }, headline: 'THE LEAGUE ENDURES', note: 'Liberty stays wide while the union wears dangerously thin.' },\n        { label: 'Add a Bill of Rights first', eff: { l: 12, u: 4, o: -2 }, headline: 'RIGHTS WRIT IN STONE', note: 'The people\\u2019s shield is raised before the sword of state.' },\n      ] },\n  ];\n\n  componentDidMount() {\n    this.bakedPtr = 1;\n    this.history = [];\n    this.turnsDone = 0;\n    this.collapse = false;\n    this.pendingNext = null;\n    if (window.claude && typeof window.claude.complete === 'function') this.setState({ aiLive: true });\n    this._boot = setTimeout(() => this.setState({ screen: 'title' }), 2400);\n  }\n  componentWillUnmount() { clearTimeout(this._boot); if (this.ac) try { this.ac.close(); } catch (e) {} }\n\n  // ---------- audio ----------\n  initAudio() { if (this.ac) { if (this.ac.state === 'suspended') this.ac.resume(); return; } try { this.ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }\n  beep(f, d, type = 'square', vol = 0.12, slide = 0) {\n    if (!this.ac || this.state.muted) return;\n    const t = this.ac.currentTime, o = this.ac.createOscillator(), g = this.ac.createGain();\n    o.type = type; o.frequency.setValueAtTime(f, t);\n    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, f + slide), t + d);\n    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + d);\n    o.connect(g); g.connect(this.ac.destination); o.start(t); o.stop(t + d);\n  }\n  sfx(n) {\n    if (n === 'select') this.beep(660, 0.08, 'square', 0.1, 180);\n    else if (n === 'stamp') { this.beep(180, 0.12, 'square', 0.14, -60); setTimeout(() => this.beep(120, 0.16, 'sawtooth', 0.1), 70); }\n    else if (n === 'fanfare') [523, 659, 784, 1047, 880, 1047].forEach((f, i) => setTimeout(() => this.beep(f, 0.2, 'square', 0.13), i * 150));\n    else if (n === 'collapse') [392, 311, 247, 165].forEach((f, i) => setTimeout(() => this.beep(f, 0.24, 'sawtooth', 0.13), i * 160));\n  }\n  onMute = () => this.setState((s) => ({ muted: !s.muted }));\n\n  // ---------- AI ----------\n  async aiComplete(prompt) {\n    const to = (p, ms) => Promise.race([p, new Promise((_, r) => setTimeout(() => r(new Error('t')), ms))]);\n    if (window.claude && typeof window.claude.complete === 'function') {\n      try { const t = await to(window.claude.complete(prompt), 14000); if (t) { this.markLive(); return t; } } catch (e) {}\n    }\n    try {\n      const r = await to(fetch('/api/ai', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt }) }), 14000);\n      if (r.ok) { const j = await r.json(); if (j && j.text) { this.markLive(); return j.text; } }\n    } catch (e) {}\n    return null;\n  }\n  markLive() { if (!this.state.aiLive) this.setState({ aiLive: true }); }\n\n  parseJSON(txt) {\n    if (!txt) return null;\n    let s = String(txt).trim().replace(/^```json/i, '').replace(/^```/, '').replace(/```$/, '').trim();\n    const a = s.indexOf('{'), b = s.lastIndexOf('}');\n    if (a < 0 || b < 0) return null;\n    try { return JSON.parse(s.slice(a, b + 1)); } catch (e) { return null; }\n  }\n\n  // ---------- flow ----------\n  onStart = () => {\n    this.initAudio();\n    this.sfx('select');\n    this.bakedPtr = 1; this.history = []; this.turnsDone = 0; this.collapse = false; this.pendingNext = null;\n    this.setState({ screen: 'play', year: 1776, meters: { liberty: 50, prosperity: 50, unity: 50, order: 50 }, dilemma: this.BAKED[0], result: null, legacy: null });\n  };\n\n  choose(i) {\n    const d = this.state.dilemma; if (!d) return;\n    const raw = d.options[i]; const opt = typeof raw === 'string' ? { label: raw } : raw;\n    this.sfx('select');\n    this.history.push({ prompt: d.prompt, choice: opt.label });\n    this.setState({ screen: 'resolving', thinkingText: this.THINK[Math.floor(Math.random() * this.THINK.length)] });\n    this.runTurn(d, opt);\n  }\n\n  async runTurn(d, opt) {\n    const m = this.state.meters;\n    const prompt = `You are the engine of FOUND A REPUBLIC, an 8-bit civics sim set during the U.S. founding (1776-1791). The player leads a young republic through hard tradeoffs. Teach a real civic idea through consequences. Be vivid, period-flavored, a touch witty, and non-partisan about modern politics.\\n\\nYear: ${this.state.year}\\nMeters (0-100): Liberty ${m.liberty}, Prosperity ${m.prosperity}, Unity ${m.unity}, Order ${m.order}\\nDilemma faced: \"${d.prompt}\"\\nThe player chose: \"${opt.label}\"\\n\\nReturn ONLY minified JSON, no markdown, exactly this shape:\\n{\"headline\":\"<=7 word period newspaper headline, ALL CAPS\",\"chronicle\":\"<=42 words: what happens plus the civic lesson, in-world\",\"effects\":{\"liberty\":<int -15..15>,\"prosperity\":<int -15..15>,\"unity\":<int -15..15>,\"order\":<int -15..15>},\"next\":{\"speaker\":\"<2-3 word advisor title, ALL CAPS>\",\"year\":<int, a few years later>,\"prompt\":\"<=34 word next dilemma: a real founding-era tradeoff>\",\"options\":[\"<=6 words\",\"<=6 words\",\"<=6 words\"]}}`;\n\n    const parsed = this.parseJSON(await this.aiComplete(prompt));\n    let headline, chronicle, eff, next, year = this.state.year;\n\n    if (parsed && parsed.effects && parsed.next && Array.isArray(parsed.next.options)) {\n      headline = String(parsed.headline || opt.headline || 'A DECISION IS MADE').slice(0, 60);\n      chronicle = String(parsed.chronicle || opt.note || '').slice(0, 320);\n      eff = this.sanitizeEff(parsed.effects);\n      const opts = parsed.next.options.filter((x) => typeof x === 'string' && x.trim()).slice(0, 3).map((x) => x.slice(0, 60));\n      next = opts.length >= 2 ? { speaker: String(parsed.next.speaker || 'THE COUNCIL').slice(0, 24).toUpperCase(), prompt: String(parsed.next.prompt || '').slice(0, 220), options: opts } : this.nextBaked();\n      const ny = Number(parsed.next.year);\n      if (ny > year && ny <= year + 5) year = ny; else year = Math.min(1796, year + 3);\n    } else {\n      headline = opt.headline || 'A DECISION IS MADE';\n      chronicle = opt.note || 'The decree is enacted, and the republic feels its weight.';\n      eff = opt.eff ? { liberty: opt.eff.l || 0, prosperity: opt.eff.p || 0, unity: opt.eff.u || 0, order: opt.eff.o || 0 } : this.deriveEff(opt.label);\n      next = this.nextBaked();\n      year = Math.min(1791, year + 2);\n    }\n\n    // apply\n    const nm = {\n      liberty: this.clamp(m.liberty + eff.liberty), prosperity: this.clamp(m.prosperity + eff.prosperity),\n      unity: this.clamp(m.unity + eff.unity), order: this.clamp(m.order + eff.order),\n    };\n    this.turnsDone++;\n    this.pendingNext = next;\n    this.collapse = (nm.liberty <= 0 || nm.prosperity <= 0 || nm.unity <= 0 || nm.order <= 0);\n    this.sfx('stamp');\n    this.setState({ screen: 'result', meters: nm, year, result: { headline, chronicle, eff, year } });\n  }\n\n  sanitizeEff(e) {\n    const c = (v) => Math.max(-15, Math.min(15, Math.round(Number(v) || 0)));\n    return { liberty: c(e.liberty), prosperity: c(e.prosperity), unity: c(e.unity), order: c(e.order) };\n  }\n  deriveEff(label) {\n    let h = 0; for (let i = 0; i < label.length; i++) h = (h * 31 + label.charCodeAt(i)) >>> 0;\n    const keys = ['liberty', 'prosperity', 'unity', 'order'];\n    const up = keys[h % 4], dn = keys[(h >> 3) % 4];\n    const e = { liberty: 0, prosperity: 0, unity: 0, order: 0 };\n    e[up] += 8 + (h % 5); if (dn !== up) e[dn] -= 4 + ((h >> 5) % 6);\n    return e;\n  }\n  nextBaked() { const d = this.BAKED[this.bakedPtr % this.BAKED.length]; this.bakedPtr++; return d; }\n  clamp(v) { return Math.max(0, Math.min(100, v)); }\n\n  onContinue = () => {\n    this.sfx('select');\n    if (this.turnsDone >= this.MAX_TURNS || this.collapse) { this.runLegacy(); return; }\n    this.setState({ screen: 'play', dilemma: this.pendingNext });\n  };\n\n  async runLegacy() {\n    this.setState({ screen: 'resolving', thinkingText: 'History renders its verdict\\u2026' });\n    const m = this.state.meters;\n    const choices = this.history.map((h) => '- ' + h.choice).join('\\n');\n    const collapsed = this.collapse;\n    const prompt = `FOUND A REPUBLIC has ended in the year ${this.state.year}.${collapsed ? ' One pillar of the republic has COLLAPSED to zero.' : ''}\\nFinal meters (0-100): Liberty ${m.liberty}, Prosperity ${m.prosperity}, Unity ${m.unity}, Order ${m.order}.\\nKey decisions the founder made:\\n${choices}\\n\\nWrite the republic's legacy. Return ONLY minified JSON, no markdown:\\n{\"title\":\"<3-5 word epithet for this republic>\",\"verdict\":\"<=65 words, written like the closing paragraph of a history textbook; name the real tradeoffs they made and what kind of nation resulted>\",\"grade\":\"<one of: Founding Triumph, Enduring Union, Fragile Experiment, House Divided, Cautionary Tale>\"}`;\n\n    const parsed = this.parseJSON(await this.aiComplete(prompt));\n    let legacy;\n    if (parsed && parsed.verdict) {\n      legacy = { title: String(parsed.title || 'The Young Republic').slice(0, 40), verdict: String(parsed.verdict).slice(0, 480), grade: this.normGrade(parsed.grade) };\n    } else legacy = this.bakedLegacy(collapsed);\n    this.sfx(collapsed ? 'collapse' : 'fanfare');\n    this.setState({ screen: 'legacy', legacy });\n  }\n\n  normGrade(g) {\n    const ok = ['FOUNDING TRIUMPH', 'ENDURING UNION', 'FRAGILE EXPERIMENT', 'HOUSE DIVIDED', 'CAUTIONARY TALE'];\n    const up = String(g || '').toUpperCase();\n    return ok.find((x) => up.includes(x.split(' ')[0])) || 'FRAGILE EXPERIMENT';\n  }\n  bakedLegacy(collapsed) {\n    const m = this.state.meters;\n    const arr = [['Liberty', m.liberty], ['Prosperity', m.prosperity], ['Unity', m.unity], ['Order', m.order]].sort((a, b) => b[1] - a[1]);\n    const top = arr[0][0], low = arr[3][0], avg = (m.liberty + m.prosperity + m.unity + m.order) / 4;\n    let grade = avg >= 62 ? 'ENDURING UNION' : avg >= 45 ? 'FRAGILE EXPERIMENT' : 'CAUTIONARY TALE';\n    if (collapsed) grade = 'HOUSE DIVIDED';\n    return {\n      title: collapsed ? 'The Republic That Broke' : top === 'Liberty' ? 'The Free Republic' : top === 'Order' ? 'The Iron Republic' : top === 'Unity' ? 'The Bound Republic' : 'The Merchant Republic',\n      grade,\n      verdict: `Founded on ${top.toLowerCase()} and tested in its ${low.toLowerCase()}, this republic took the shape of its founder's choices. ${collapsed ? 'A pillar gave way, and the union fractured under its own contradictions.' : 'Its citizens inherited both the strengths it prized and the bargains it postponed.'} History, as ever, kept the receipts.`,\n    };\n  }\n\n  renderVals() {\n    const s = this.state, m = s.meters;\n    const r = s.result;\n    const deltas = r ? Object.entries(r.eff).filter(([k, v]) => v !== 0).map(([k, v]) => ({\n      text: k.toUpperCase() + ' ' + (v > 0 ? '+' + v : v),\n      color: v > 0 ? '#5fb87a' : '#e94f37',\n    })) : [];\n    const gradeColors = { 'FOUNDING TRIUMPH': '#f2c14e', 'ENDURING UNION': '#5fb87a', 'FRAGILE EXPERIMENT': '#6f9bff', 'HOUSE DIVIDED': '#e07a3b', 'CAUTIONARY TALE': '#e94f37' };\n    const inGame = ['play', 'resolving', 'result', 'legacy'].includes(s.screen);\n\n    return {\n      refRoot: (el) => { this.root = el; },\n      onStart: this.onStart, onContinue: this.onContinue, onMute: this.onMute,\n      isBoot: s.screen === 'boot', isTitle: s.screen === 'title', isPlay: s.screen === 'play',\n      isResolving: s.screen === 'resolving', isResult: s.screen === 'result', isLegacy: s.screen === 'legacy',\n      inGame,\n      year: s.year,\n      libVal: m.liberty, prosVal: m.prosperity, uniVal: m.unity, ordVal: m.order,\n      libW: m.liberty + '%', prosW: m.prosperity + '%', uniW: m.unity + '%', ordW: m.order + '%',\n      speaker: s.dilemma ? s.dilemma.speaker : '',\n      prompt: s.dilemma ? s.dilemma.prompt : '',\n      options: s.dilemma ? s.dilemma.options.map((o, i) => ({ label: typeof o === 'string' ? o : o.label, on: () => this.choose(i) })) : [],\n      thinkingText: s.thinkingText,\n      headline: r ? r.headline : '', chronicle: r ? r.chronicle : '', resultYear: r ? r.year : s.year,\n      deltas,\n      continueLabel: (this.turnsDone >= this.MAX_TURNS || this.collapse) ? 'SEE YOUR LEGACY' : 'NEXT DECISION',\n      legacyTitle: s.legacy ? s.legacy.title : '', legacyVerdict: s.legacy ? s.legacy.verdict : '',\n      legacyGrade: s.legacy ? s.legacy.grade : '', gradeColor: s.legacy ? (gradeColors[s.legacy.grade] || '#6f9bff') : '#6f9bff',\n      aiLive: s.aiLive, aiLabel: s.aiLive ? 'AI ENGINE' : 'DEMO MODE', aiColor: s.aiLive ? '#5fb87a' : '#6f7290',\n      muted: s.muted, muteLabel: s.muted ? 'SND OFF' : 'SND ON',\n      footerLabel: inGame ? ('DECISION ' + Math.min(this.turnsDone + (s.screen === 'play' ? 1 : 0), this.MAX_TURNS) + ' / ' + this.MAX_TURNS) : 'AI-POWERED',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
